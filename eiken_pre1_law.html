<script>
var Q=[{"s":"The attorney filed an urgent motion to ( ) the evidence obtained during the illegal search, arguing it should be inadmissible in court.","a":0,"o":["exclude","dispute","challenge","present"],"t":"弁護士は、不法な捜索中に得られた証拠は証拠能力がないと主張し、それを排除するよう緊急申し立てを提出した。","e":"<span class='fb-correct'>✓ 正解：exclude</span>exclude は「〜を排除する・除外する」。exclude evidence / exclude from trial / inadmissible and excluded は法律系で必須語。","tip":"💡 exclusion（名詞）も重要。prevent something from being used or considered"},{"s":"After three days of deliberation, the jury returned a unanimous ( ) of not guilty, and the defendant was immediately released from custody.","a":1,"o":["ruling","verdict","sentence","judgment"],"t":"3日間の評議の後、陪審員は全員一致で無罪の評決を返し、被告は直ちに拘留から解放された。","e":"<span class='fb-correct'>✓ 正解：verdict</span>verdict は「（陪審員の）評決」。deliver a verdict / guilty verdict / unanimous verdict は法律・司法系で必須語。","tip":"💡 verdict = the decision made by a jury（陪審員の評決）"},{"s":"The court issued an ( ) requiring the company to immediately halt all construction activities pending a full environmental impact assessment.","a":2,"o":["order","ruling","injunction","mandate"],"t":"裁判所は完全な環境影響評価が完了するまで全建設活動を即時停止するよう求める差止命令を発行した。","e":"<span class='fb-correct'>✓ 正解：injunction</span>injunction は「差止命令」。court injunction / seek an injunction / temporary injunction は法律系で頻出。","tip":"💡 injunction = court order requiring someone to do or stop doing something（裁判所の作為・不作為命令）"},{"s":"The lawyers advised their client to ( ) a settlement offer rather than risk the uncertainty and expense of a lengthy court trial.","a":3,"o":["reject","dispute","contest","accept"],"t":"弁護士たちは長い裁判の不確実性と費用のリスクを避けるために和解の申し出を受け入れるようクライアントに助言した。","e":"<span class='fb-correct'>✓ 正解：accept</span>accept は「〜を受け入れる」。accept a settlement / accept the terms / accept liability は法律・ビジネス系で頻出。","tip":"💡 settlement = agreement reached to avoid a court trial（裁判を避けるための和解）"},{"s":"Under the legal principle of ( ), a person accused of a crime is presumed innocent until the prosecution proves guilt beyond a reasonable doubt.","a":0,"o":["presumption","assumption","principle","doctrine"],"t":"（　　）という法的原則の下では、犯罪で告発された人は検察が合理的な疑いを超えて有罪を証明するまでは無罪と推定される。","e":"<span class='fb-correct'>✓ 正解：presumption</span>presumption は「（法的）推定・前提」。presumption of innocence / legal presumption / rebuttable presumption は法律系で必須語。","tip":"💡 presumption of innocence = innocent until proven guilty（無罪推定の原則）"},{"s":"The whistleblower claimed to be ( ) from prosecution under the terms of a formal immunity agreement negotiated with federal investigators.","a":1,"o":["protected","exempt","shielded","immune"],"t":"内部告発者は、連邦捜査官と交渉した正式な免責合意の条件の下で訴追から免除されていると主張した。","e":"<span class='fb-correct'>✓ 正解：exempt</span>exempt は「免除された・適用外の」。exempt from prosecution / tax exempt / exemption from は法律・行政系で頻出。","tip":"💡 exemption（名詞）も重要。free from an obligation or liability"},{"s":"The firm hired experienced legal counsel to ( ) its intellectual property rights against a competitor that had allegedly copied its patented design.","a":2,"o":["claim","defend","uphold","protect"],"t":"その会社は特許を取得したデザインをコピーしたとされる競合他社に対して知的財産権を支持するために経験豊富な法律顧問を雇った。","e":"<span class='fb-correct'>✓ 正解：uphold</span>uphold は「〜を支持する・守り通す」。uphold a right / uphold the law / uphold a decision は法律系で頻出。","tip":"💡 uphold = confirm or support a decision or right（決定・権利を支持・維持する）"},{"s":"The accused appeared in court to enter a formal ( ) of not guilty to all five charges filed against him by the prosecution.","a":3,"o":["statement","defense","response","plea"],"t":"被告は検察から提起された5つすべての罪状に対して無罪の正式な答弁を行うために法廷に出廷した。","e":"<span class='fb-correct'>✓ 正解：plea</span>plea は「（法廷での）答弁・嘆願」。enter a plea / plea of guilty / plea bargain は法律系で必須語。","tip":"💡 plea = formal statement of guilty or not guilty（法廷での有罪・無罪の答弁）"},{"s":"The court found the defendant ( ) of insider trading and ordered him to pay substantial financial penalties in addition to a prison sentence.","a":0,"o":["guilty","liable","responsible","culpable"],"t":"裁判所は被告のインサイダー取引に対して有罪を認定し、禁固刑に加えて多額の金銭的罰則の支払いを命じた。","e":"<span class='fb-correct'>✓ 正解：guilty</span>guilty は「有罪の・罪のある」。found guilty / plead guilty / guilty verdict は法律系で必須語。","tip":"💡 guilty ↔ innocent（有罪 ↔ 無罪）。responsible for a crime"},{"s":"Defense attorneys argued that their client had been the victim of ( ) identification — a well-documented phenomenon that leads to wrongful convictions.","a":2,"o":["false","erroneous","mistaken","flawed"],"t":"弁護側弁護士は、クライアントが誤った認識の被害者だったと主張した。これは冤罪につながるよく記録された現象だ。","e":"<span class='fb-correct'>✓ 正解：mistaken</span>mistaken は「誤った・間違った」。mistaken identity / mistaken belief / wrongful conviction は法律系で頻出。","tip":"💡 mistaken identity = wrongly identifying someone as a suspect（人違い・誤認）"},{"s":"The judge issued a ( ) of contempt against the witness who repeatedly refused to answer questions despite being under oath.","a":2,"o":["charge","penalty","citation","ruling"],"t":"裁判官は宣誓しているにもかかわらず繰り返し質問への回答を拒否した証人に対して法廷侮辱の決定を下した。","e":"<span class='fb-correct'>✓ 正解：citation</span>citation は「引用・（法的）召喚状・表彰」。contempt citation / legal citation / issue a citation は法律系で頻出。","tip":"💡 citation = official summons or reference（公式召喚・引用）"},{"s":"Under the terms of the plea bargain, the defendant agreed to ( ) to a lesser charge in exchange for a significantly reduced sentence.","a":3,"o":["admit","concede","confess","plead"],"t":"司法取引の条件に基づき、被告は大幅に減刑される代わりに軽い罪状に答弁することに同意した。","e":"<span class='fb-correct'>✓ 正解：plead</span>plead は「（罪状に）答弁する・弁護する」。plead guilty / plead not guilty / plead the fifth は法律系で必須語。","tip":"💡 plea（名詞）も重要。formally state your position in court"},{"s":"The expert witness was called to ( ) on the psychological state of the defendant at the time the alleged crime was committed.","a":0,"o":["testify","speak","comment","report"],"t":"専門家証人は申し立てられた犯罪が行われた時点での被告の心理状態について証言するために召喚された。","e":"<span class='fb-correct'>✓ 正解：testify</span>testify は「証言する・宣誓の上で述べる」。testify in court / testify under oath / expert testimony は法律系で必須語。","tip":"💡 testimony（名詞）も重要。give evidence under oath in a court"},{"s":"The new data privacy legislation will ( ) companies to obtain explicit user consent before collecting or sharing any personal data with third parties.","a":1,"o":["encourage","require","permit","allow"],"t":"新しいデータプライバシー法は、企業が第三者に個人データを収集・共有する前に明示的なユーザーの同意を得ることを義務付ける。","e":"<span class='fb-correct'>✓ 正解：require</span>require は「〜を義務付ける・要求する」。legally required / require compliance / mandatory requirement は法律・規制系で必須語。","tip":"💡 requirement（名詞）も重要。make something obligatory by law"},{"s":"The corporation was found to have engaged in ( ) practices by setting artificially low prices designed to drive competitors out of the market.","a":2,"o":["illegal","monopolistic","predatory","anticompetitive"],"t":"その企業は競合他社を市場から追い出すために人工的に低い価格を設定するという略奪的な慣行に従事していたことが判明した。","e":"<span class='fb-correct'>✓ 正解：predatory</span>predatory は「略奪的な・捕食的な」。predatory pricing / predatory behavior / predatory lending は経済・法律系で頻出。","tip":"💡 predator（捕食者）の形容詞形。exploiting others for one's own gain"},{"s":"The appeals court ultimately ruled that the lower court had made a ( ) error by admitting hearsay evidence that should have been excluded.","a":3,"o":["critical","serious","grave","procedural"],"t":"控訴裁判所は下級裁判所が排除されるべきであった伝聞証拠を採用するという手続き上の誤りを犯したと最終的に裁定した。","e":"<span class='fb-correct'>✓ 正解：procedural</span>procedural は「手続き上の・手順に関する」。procedural error / procedural requirements / procedural fairness は法律系で頻出。","tip":"💡 procedure（手続き）の形容詞形。relating to an established legal process"},{"s":"The ( ) awarded to the plaintiff totaled over five million dollars, reflecting the jury's view of the severe and lasting harm caused by the defendant.","a":0,"o":["damages","compensation","settlement","penalty"],"t":"原告に認められた損害賠償額は500万ドルを超え、被告による深刻で永続的な損害に関する陪審員の見解を反映していた。","e":"<span class='fb-correct'>✓ 正解：damages</span>damages（損害賠償金）は「〜に対する金銭的補償」。award damages / punitive damages / compensatory damages は法律系で必須語。","tip":"💡 damages = money claimed or awarded as compensation（損害賠償として請求・認められる金額）"},{"s":"The board of directors has a ( ) duty to act in the best financial interests of the company's shareholders, not in their own personal interests.","a":2,"o":["legal","financial","fiduciary","statutory"],"t":"取締役会は自分たち自身の個人的な利益ではなく、会社の株主の最良の財務的利益のために行動する受託者義務を負っている。","e":"<span class='fb-correct'>✓ 正解：fiduciary</span>fiduciary は「受託者の・信託の」。fiduciary duty / fiduciary responsibility / breach of fiduciary duty は法律・金融系で頻出。","tip":"💡 fiduciary duty = legal obligation to act in another's best interest（他者の最善の利益のために行動する法的義務）"},{"s":"The grand jury returned a formal ( ) against the senator, charging him with five counts of bribery and abuse of public office.","a":2,"o":["verdict","ruling","indictment","judgment"],"t":"大陪審は上院議員に対して正式な起訴状を返し、収賄5件と公職濫用で告発した。","e":"<span class='fb-correct'>✓ 正解：indictment</span>indictment は「（大陪審による）起訴・起訴状」。return an indictment / formal indictment / indicted on charges は法律系で必須語。","tip":"💡 indict（起訴する）の名詞形。formal charge by a grand jury"},{"s":"The judge sentenced the convicted fraudster to ten years in prison without the possibility of ( ) for the first five years of the term.","a":3,"o":["appeal","release","acquittal","parole"],"t":"裁判官は詐欺罪で有罪となった人物に、刑期の最初の5年間は仮釈放の可能性なしに10年の禁固刑を言い渡した。","e":"<span class='fb-correct'>✓ 正解：parole</span>parole は「仮釈放・仮出所」。granted parole / eligible for parole / parole conditions は法律系で必須語。","tip":"💡 parole = early release from prison under conditions（条件付き早期釈放）"},{"s":"The prosecutor presented a compelling ( ) of evidence linking the accused to the scene of the crime through DNA analysis and security footage.","a":0,"o":["array","volume","body","case"],"t":"検察官はDNA分析と防犯カメラ映像によって被告を犯行現場と結びつける説得力のある証拠一式を提示した。","e":"<span class='fb-correct'>✓ 正解：array</span>array は「一連の・多種多様な」。an array of evidence / a compelling array / broad array of は法律・一般系で頻出。","tip":"💡 array = an impressive range or variety（印象的な一連・多様な配列）"},{"s":"The ( ) privilege means that communications between a lawyer and client are confidential and generally cannot be disclosed in court without the client's consent.","a":1,"o":["legal","attorney-client","confidentiality","judicial"],"t":"弁護士・依頼人間の特権とは、弁護士と依頼人の間のコミュニケーションが秘密であり、依頼人の同意なしには一般的に法廷で開示できないことを意味する。","e":"<span class='fb-correct'>✓ 正解：attorney-client</span>attorney-client privilege は「弁護士・依頼人間の特権」。protected by attorney-client privilege / waive attorney-client privilege は法律系で必須語。","tip":"💡 attorney-client privilege = legal protection of lawyer-client communications（弁護士・依頼人間の通信の法的保護）"},{"s":"Under international law, nations have a duty to grant ( ) protection to people fleeing genuine threats to their life or freedom in their home country.","a":2,"o":["diplomatic","legal","refugee","temporary"],"t":"国際法の下では、国家は故国で生命や自由への真の脅威から逃れている人々に難民保護を付与する義務を負っている。","e":"<span class='fb-correct'>✓ 正解：refugee</span>refugee は「難民の」（形容詞）または「難民」（名詞）。refugee protection / refugee status / refugee law は国際法・人権系で必須語。","tip":"💡 refugee status = legal recognition as someone fleeing persecution（迫害から逃れる者の法的認定）"},{"s":"The law firm filed a class-action ( ) on behalf of thousands of consumers who claimed the company had deliberately misled them about product safety.","a":3,"o":["claim","complaint","appeal","lawsuit"],"t":"法律事務所は、会社が故意に製品の安全性について誤解させたと主張する数千人の消費者を代表して集団訴訟を提起した。","e":"<span class='fb-correct'>✓ 正解：lawsuit</span>lawsuit は「（民事）訴訟・裁判」。file a lawsuit / class-action lawsuit / settle a lawsuit は法律系で必須語。","tip":"💡 lawsuit = a claim brought to a court of law（裁判所に持ち込まれた法的請求）"},{"s":"The ( ) principle states that a person cannot be tried twice for the same crime once they have been acquitted or convicted in a court of law.","a":0,"o":["double jeopardy","due process","habeas corpus","presumption"],"t":"二重の危険の原則は、裁判所で一度無罪または有罪とされた後は、同じ罪で二度裁判にかけられることはないと定めている。","e":"<span class='fb-correct'>✓ 正解：double jeopardy</span>double jeopardy は「二重の危険（同一犯罪での二重裁判の禁止）」。double jeopardy rule / protected by double jeopardy は法律系で重要。","tip":"💡 double jeopardy = cannot be tried twice for the same crime（同じ犯罪での二度の裁判禁止）"},{"s":"The legal concept of ( ) corpus requires authorities to bring a detained person before a court and justify the lawfulness of their continued imprisonment.","a":1,"o":["double jeopardy","habeas corpus","due process","mens rea"],"t":"人身保護令状の法的概念は、当局が拘留された人物を法廷に連れ出し、継続的な拘禁の合法性を正当化することを求める。","e":"<span class='fb-correct'>✓ 正解：habeas corpus</span>habeas corpus（人身保護令状）は「不当な拘禁からの保護」。file for habeas corpus / habeas corpus petition は法律・人権系で重要。","tip":"💡 habeas corpus（ラテン語）= you shall have the body（身体を提示せよ：不当拘禁の禁止）"},{"s":"The appeal was based on the claim that the defendant's right to ( ) process had been violated when evidence was obtained without a proper search warrant.","a":2,"o":["judicial","legal","due","fair"],"t":"控訴は、適切な捜索令状なしに証拠が取得された際に被告の適正手続きの権利が侵害されたという主張に基づいていた。","e":"<span class='fb-correct'>✓ 正解：due</span>due（process）は「適正（手続き）」。due process of law / violation of due process / right to due process は法律・憲法系で必須語。","tip":"💡 due process = fair treatment through the established legal system（確立された法制度を通じた公正な扱い）"},{"s":"The crime of ( ) involves the deliberate killing of another person with premeditation and malicious intent, and carries the most severe legal penalties.","a":3,"o":["manslaughter","homicide","assault","murder"],"t":"謀殺の罪は、事前の計画と悪意ある意図を持って他者を故意に殺すことを含み、最も重い法的刑罰が科される。","e":"<span class='fb-correct'>✓ 正解：murder</span>murder は「（第一級）謀殺」。first-degree murder / convicted of murder / murder charge は法律・刑事系で必須語。","tip":"💡 murder（謀殺）↔ manslaughter（故殺）。premeditated killing with intent"},{"s":"The defense submitted evidence to prove ( ), arguing that the defendant was physically located in a different city when the alleged crime took place.","a":0,"o":["alibi","motive","innocence","defense"],"t":"弁護側は、申し立てられた犯罪が行われた時に被告が物理的に別の都市にいたと主張して、アリバイを証明する証拠を提出した。","e":"<span class='fb-correct'>✓ 正解：alibi</span>alibi は「アリバイ・不在証明」。provide an alibi / solid alibi / alibi witness は法律・推理系で必須語。","tip":"💡 alibi（ラテン語）= elsewhere（他の場所にいたという不在証明）"},{"s":"The evidence presented by both sides was carefully weighed by the ( ), who returned a verdict after five days of deliberation.","a":1,"o":["judge","jury","panel","court"],"t":"双方から提示された証拠は5日間の評議の後に評決を返した陪審員によって慎重に検討された。","e":"<span class='fb-correct'>✓ 正解：jury</span>jury は「陪審員（団）」。trial by jury / jury deliberation / hung jury は法律系で必須語。","tip":"💡 jury = group of citizens who decide a verdict（評決を下す市民グループ）"}];

var cur=0,score=0,wrong=[],done=false;
function go(){cur=0;score=0;wrong=[];done=false;document.getElementById('s0').className='screen';document.getElementById('s1').className='screen active';render();}
function render(){done=false;var q=Q[cur],t=Q.length;
  document.getElementById('pc').textContent=(cur+1)+' / '+t;
  document.getElementById('sv').textContent='\u6b63\u89e3: '+score;
  document.getElementById('pf').style.width=((cur/t)*100)+'%';
  document.getElementById('qt').textContent='QUESTION '+(cur+1);
  document.getElementById('qs').innerHTML=q.s.replace('( )','<span class="bk">（　　　）</span>');
  document.getElementById('qt2').textContent=q.t;
  var g=document.getElementById('og');g.innerHTML='';
  ['A','B','C','D'].forEach(function(l,i){
    var b=document.createElement('button');b.className='ob';
    b.innerHTML='<span class="ol">'+l+'</span> '+q.o[i];
    b.onclick=(function(idx){return function(){pick(idx);};})(i);
    g.appendChild(b);});
  var fb=document.getElementById('fb');fb.className='fb';fb.innerHTML='';
  document.getElementById('bn').className='bn';}
function pick(i){if(done)return;done=true;var q=Q[cur];
  var bs=document.getElementById('og').querySelectorAll('.ob');
  bs.forEach(function(b){b.disabled=true;});
  if(i===q.a){score++;bs[i].classList.add('co');}
  else{bs[i].classList.add('wr');bs[q.a].classList.add('co');wrong.push({q:q,w:q.o[i]});}
  var fb=document.getElementById('fb');
  fb.innerHTML='<div style="margin-bottom:8px;font-size:12px;color:#94a3b8">'+q.tip+'</div>'+q.e;
  fb.className='fb on';
  document.getElementById('sv').textContent='\u6b63\u89e3: '+score;
  document.getElementById('bn').className='bn on';}
function nxt(){cur++;if(cur<Q.length){render();}else{showResult();}}
function showResult(){document.getElementById('s1').className='screen';document.getElementById('s2').className='screen active';
  var t=Q.length,p=Math.round(score/t*100),k,c,bc;
  if(score>=28){k='S';c='英検準1級の語彙は完璧なレベルです。1級レベルの語彙強化に進みましょう。';bc='linear-gradient(135deg,#f0b429,#e09b00)';}
  else if(score>=23){k='A';c='英検準1級合格圏内のレベルです。間違えた単語を例文ごと復習して完成度を高めましょう。';bc='linear-gradient(135deg,#22c55e,#16a34a)';}
  else if(score>=18){k='B';c='もう少しで合格レベルです。高度な語彙を文脈の中で確認しながら覚え直しましょう。';bc='linear-gradient(135deg,#3b82f6,#2563eb)';}
  else{k='C';c='語彙強化が必要です。パス単準1級などで頻出語を例文ごと覚えることを推奨します。';bc='linear-gradient(135deg,#ef4444,#dc2626)';}
  document.getElementById('rk').textContent=k;
  document.getElementById('rs').textContent=score+' / '+t+' 正解（'+p+'%）';
  var rl=document.getElementById('rl');
  rl.textContent='RANK '+k;rl.style.background=bc;rl.style.color='#fff';
  document.getElementById('mf').style.width=p+'%';document.getElementById('mf').style.background=bc;
  document.getElementById('cm').textContent=c;
  var rv=document.getElementById('rv');rv.innerHTML='';
  if(wrong.length>0){
    var h='<div class="rv-title">✗ 間違えた問題の復習（'+wrong.length+'問）</div>';
    wrong.forEach(function(w){
      h+='<div class="ri"><div class="ri-s">'+w.q.s.replace('( )','（　　　）')+'</div>';
      h+='<span class="ri-w">'+w.w+'</span><span class="ri-c">→ 正解: '+w.q.o[w.q.a]+'</span>';
      h+='<div class="ri-t">'+w.q.t+'</div></div>';
    });
    rv.innerHTML=h;}
}
function restart(){document.getElementById('s2').className='screen';go();}

  var k=document.getElementById('rk').textContent;
  var url=encodeURIComponent(window.location.href);
  var msg=encodeURIComponent('英検準1級語彙チェック、ランク'+k+'でした！あなたも試してみてください。');
  window.open('https://social-plugins.line.me/lineit/share?url='+url+'&text='+msg,'_blank');}

</script>
