<style>
:root{--n:#0e2040;--n2:#162b55;--b:#2563eb;--bl:#3b82f6;--gd:#f0b429;--gn:#22c55e;--rd:#ef4444;--w:#f8fafc;--gr:#94a3b8;--gr2:#334155;--bd:rgba(255,255,255,0.1);--line:#06C755}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--n);color:var(--w);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 16px 48px}
header{width:100%;max-width:640px;padding:20px 0 12px;text-align:center}
.sl{font-size:10px;letter-spacing:.18em;color:var(--gr);text-transform:uppercase;margin-bottom:4px}
.at{font-family:'DM Serif Display',serif;font-size:22px;letter-spacing:.02em}
.as{font-size:11px;color:var(--gr);margin-top:4px;letter-spacing:.1em}
.screen{display:none;width:100%;max-width:640px}.screen.active{display:block}
.sc{background:var(--n2);border:1px solid var(--bd);border-radius:16px;padding:32px 24px;text-align:center;margin-top:12px}
.badge{display:inline-block;background:rgba(37,99,235,.25);border:1px solid var(--b);color:var(--bl);font-size:11px;font-weight:700;letter-spacing:.12em;padding:4px 12px;border-radius:99px;margin-bottom:20px}
.sc h2{font-size:20px;font-weight:700;line-height:1.5;margin-bottom:12px}

.ig{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:28px}
.ii{background:rgba(255,255,255,.05);border-radius:10px;padding:12px 8px}
.in{font-family:'DM Serif Display',serif;font-size:24px;color:var(--gd);display:block}
.il{font-size:11px;color:var(--gr);margin-top:2px;display:block}
.bs{width:100%;background:var(--b);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;padding:15px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;letter-spacing:.05em;transition:background .2s}
.bs:hover{background:var(--bl)}
.pw{margin:16px 0 20px}
.pr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.pc,.sv{font-size:12px;color:var(--gr);letter-spacing:.08em}
.pb{height:4px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden}

.qc{background:var(--n2);border:1px solid var(--bd);border-radius:16px;padding:24px 20px;margin-bottom:14px}

.ob{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--bd);color:var(--w);border-radius:10px;font-size:14px;font-family:'Noto Sans JP',sans-serif;font-weight:500;padding:14px 16px;text-align:left;cursor:pointer;display:flex;align-items:center;gap:12px;transition:background .15s,border-color .15s}

.ol{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:6px;background:rgba(255,255,255,.08);font-size:12px;font-weight:700;flex-shrink:0}
.ob.co{background:rgba(34,197,94,.15);border-color:var(--gn)}.ob.co .ol{background:var(--gn);color:#fff}
.ob.wr{background:rgba(239,68,68,.15);border-color:var(--rd)}.ob.wr .ol{background:var(--rd);color:#fff}

.fb{background:rgba(255,255,255,.04);border:1px solid var(--bd);border-radius:12px;padding:16px;margin-top:12px;font-size:13px;line-height:1.8;color:#cbd5e1;display:none}
.fb.on{display:block}
.bn{width:100%;background:var(--b);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;padding:14px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;letter-spacing:.05em;transition:background .2s;margin-top:12px;display:none}
.bn.on{display:block}.bn:hover{background:var(--bl)}
.rc{background:var(--n2);border:1px solid var(--bd);border-radius:16px;padding:32px 24px;text-align:center;margin-top:12px}
.rk{font-family:'DM Serif Display',serif;font-size:72px;line-height:1;margin:12px 0 4px}
.rs{font-size:14px;color:var(--gr);margin-bottom:20px}
.rl{display:inline-block;font-size:13px;font-weight:700;padding:6px 18px;border-radius:99px;margin-bottom:20px}
.mw{height:10px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;margin:0 auto 24px;max-width:300px}
.mf{height:100%;border-radius:99px;transition:width 1s ease}
.cm{font-size:13px;color:var(--gr);line-height:1.8;margin-bottom:20px;text-align:left;padding:16px;background:rgba(255,255,255,.04);border-radius:10px}
.btn-retry{width:100%;background:transparent;color:var(--bl);border:1px solid var(--b);border-radius:10px;font-size:14px;font-weight:700;padding:14px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;margin-top:12px;transition:background .2s}
.btn-retry:hover{background:rgba(37,99,235,.15)}
.btn-line{width:100%;background:var(--line);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;padding:14px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .2s}
.btn-line:hover{background:#05b04a}
.line-icon{width:22px;height:22px;flex-shrink:0}
#rv{margin-top:20px}
.rv-title{font-size:14px;font-weight:700;color:var(--gr);letter-spacing:.1em;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--bd)}
.ri{background:rgba(255,255,255,.04);border-radius:10px;padding:14px;margin-bottom:10px;text-align:left}
.ri-s{font-size:13px;line-height:1.8;margin-bottom:8px}
.ri-w{font-size:12px;color:#ef4444;text-decoration:line-through;margin-right:8px}
.ri-c{font-size:12px;color:var(--gd);font-weight:700}
.ri-t{font-size:12px;color:var(--gr);margin-top:6px;line-height:1.7}
footer{margin-top:32px;text-align:center;font-size:11px;color:var(--gr2);letter-spacing:.08em;width:100%;max-width:640px}
footer a{color:var(--gr);text-decoration:none}
.set-num{
  display:inline-block;

}

}

<script>
var Q=[{"s":"Scientists must ( ) their findings through repeated experiments before submitting research papers.","a":2,"o":["dismiss","assume","verify","overlook"],"t":"研究者は論文を提出する前に、繰り返しの実験を通して自分たちの発見を検証しなければならない。","e":"<span class='fb-correct'>✓ 正解：verify</span>verify は「〜を確認する・検証する」。verify results / verify accuracy など科学・研究系で頻出。confirm より「証拠をもって立証する」ニュアンスが強い。","tip":"💡 verify = confirm（より厳密な検証）"},{"s":"The new policy was introduced to ( ) the financial pressure on households struggling with rising living costs.","a":1,"o":["worsen","alleviate","impose","neglect"],"t":"生活費の上昇に苦しむ家計への財政的プレッシャーを軽減するために、新しい政策が導入された。","e":"<span class='fb-correct'>✓ 正解：alleviate</span>alleviate は「〜を軽減する・和らげる」。alleviate pain / alleviate poverty / alleviate stress は準1級頻出コロケーション。relieve とほぼ同義。","tip":"💡 alleviate = relieve（負担・痛みを軽減する）"},{"s":"Local authorities decided to ( ) the construction of new buildings in areas prone to flooding.","a":3,"o":["promote","facilitate","encourage","prohibit"],"t":"地方当局は、洪水が起きやすい地域での新しい建物の建設を禁止することを決定した。","e":"<span class='fb-correct'>✓ 正解：prohibit</span>prohibit は「〜を禁止する」。prohibit A from doing の形も重要。ban / forbid と同義だが、より法的・公式な文脈で使われる。","tip":"💡 prohibit = ban = forbid（禁止する）"},{"s":"Many experts ( ) the recent surge in mental health issues among teenagers to excessive social media use.","a":0,"o":["attribute","dedicate","expose","convert"],"t":"多くの専門家は、10代の若者の間でのメンタルヘルス問題の急増を、過剰なSNS利用が原因だと考えている。","e":"<span class='fb-correct'>✓ 正解：attribute</span>attribute A to B で「AをBのせいにする・帰因させる」。be attributed to〜（〜が原因とされる）は論文・報道で超頻出の受動態表現。","tip":"💡 attribute A to B ＝ A の原因は B だと考える"},{"s":"The new software aims to ( ) communication between team members working across different time zones.","a":2,"o":["hinder","complicate","facilitate","obstruct"],"t":"その新しいソフトウェアは、異なるタイムゾーンで働くチームメンバー間のコミュニケーションを促進することを目指している。","e":"<span class='fb-correct'>✓ 正解：facilitate</span>facilitate は「〜を促進する・容易にする」。facilitate communication / facilitate learning / facilitate cooperation は準1級頻出パターン。","tip":"💡 facilitate = make easier（公式・ビジネス文脈）"},{"s":"Spreading false information online can seriously ( ) public trust in scientific research and healthcare.","a":1,"o":["strengthen","undermine","support","enhance"],"t":"オンラインで偽情報を広めることは、科学研究や医療に対する一般市民の信頼を深刻に損なう可能性がある。","e":"<span class='fb-correct'>✓ 正解：undermine</span>undermine は「〜を少しずつ弱体化させる・損なう」。undermine confidence / undermine authority / undermine democracy は準1級頻出フレーズ。","tip":"💡 undermine = gradually weaken（じわじわ損なう）"},{"s":"The school decided to ( ) a new grading system that focuses on individual progress rather than test scores.","a":0,"o":["implement","abandon","delay","criticize"],"t":"その学校は、テストの点数よりも個人の進歩に焦点を当てた新しい採点制度を実施することを決定した。","e":"<span class='fb-correct'>✓ 正解：implement</span>implement は「〜を実施する・実行に移す」。implement a policy / implement a plan / implement measures は準1級必須コロケーション。","tip":"💡 implement a policy（政策を実施する）は最頻出フレーズ"},{"s":"Some advertisers ( ) consumer emotions by using misleading images and exaggerated claims in their campaigns.","a":3,"o":["inform","educate","persuade","manipulate"],"t":"一部の広告主は、誤解を招く画像や誇張した主張をキャンペーンに使って消費者の感情を操作する。","e":"<span class='fb-correct'>✓ 正解：manipulate</span>manipulate は「〜を操る・巧みに操作する」。manipulate data / manipulate public opinion など、意図的に歪める含意がある。persuade との区別が重要。","tip":"💡 manipulate = 意図的に操る（ネガティブなニュアンス）"},{"s":"After years of working in finance, she chose to ( ) her passion for environmental science by returning to university.","a":1,"o":["abandon","pursue","avoid","delay"],"t":"金融の仕事を何年もした後、彼女は大学に戻って環境科学への情熱を追求することを選んだ。","e":"<span class='fb-correct'>✓ 正解：pursue</span>pursue は「〜を追求する・追い求める」。pursue a career / pursue a dream / pursue a goal は英検準1級で最頻出の動詞の一つ。","tip":"💡 pursue one's passion / pursue a career（目標・夢を追う）"},{"s":"The government was criticized for attempting to ( ) information about the environmental damage caused by the new factory.","a":3,"o":["reveal","publicize","broadcast","suppress"],"t":"政府は、新しい工場によって引き起こされた環境被害に関する情報を隠蔽しようとしたとして批判を受けた。","e":"<span class='fb-correct'>✓ 正解：suppress</span>suppress は「〜を抑圧する・隠蔽する」。suppress information / suppress evidence / suppress protests。情報隠蔽の文脈で頻出。","tip":"💡 suppress = 力で抑え込む・隠蔽する"},{"s":"Many modern medicines ( ) from compounds originally found in tropical plants and rainforest organisms.","a":2,"o":["differ","deviate","derive","distance"],"t":"多くの現代の薬は、もともと熱帯の植物や熱帯雨林の生物に見られる化合物に由来している。","e":"<span class='fb-correct'>✓ 正解：derive</span>derive from〜 で「〜から引き出される・由来する」。be derived from〜（〜に由来する）の受動態も頻出。","tip":"💡 derive from = originate from（〜に由来する）"},{"s":"All companies operating in the country are required to ( ) with the new environmental regulations or face heavy fines.","a":0,"o":["comply","ignore","challenge","question"],"t":"国内で事業を行うすべての企業は、新しい環境規制を遵守するか、重い罰金に直面する必要がある。","e":"<span class='fb-correct'>✓ 正解：comply</span>comply with〜 で「〜を遵守する・に従う」。comply with regulations / comply with rules は準1級法律・ビジネス系の最重要動詞。","tip":"💡 comply with = follow / adhere to（規則に従う）"},{"s":"The president announced plans to ( ) a nationwide program to improve digital literacy among older citizens.","a":1,"o":["cancel","initiate","delay","review"],"t":"大統領は、高齢市民のデジタルリテラシーを向上させるための全国的なプログラムを開始する計画を発表した。","e":"<span class='fb-correct'>✓ 正解：initiate</span>initiate は「〜を開始する・始める」。initiate a program / initiate a process / initiate negotiations は公式・政策文脈で頻出。","tip":"💡 initiate = launch = start（より公式なニュアンス）"},{"s":"Lack of funding continues to ( ) the development of renewable energy technology in many developing countries.","a":3,"o":["promote","accelerate","support","hinder"],"t":"資金不足は多くの途上国において、再生可能エネルギー技術の発展を妨げ続けている。","e":"<span class='fb-correct'>✓ 正解：hinder</span>hinder は「〜を妨げる・邪魔をする」。hinder progress / hinder development / hinder efforts は準1級頻出コロケーション。","tip":"💡 hinder = obstruct = impede（妨げる）"},{"s":"Critics argue that large corporations ( ) cheap labor in developing countries to maximize their profits.","a":0,"o":["exploit","support","develop","protect"],"t":"批評家たちは、大企業が利益を最大化するために途上国の安価な労働力を搾取していると主張している。","e":"<span class='fb-correct'>✓ 正解：exploit</span>exploit は「〜を搾取する・不当に利用する」。exploit workers / exploit resources / exploit vulnerabilities。ネガティブな含意がある点に注意。","tip":"💡 exploit = 不当に利用する・搾取する（ネガティブ）"},{"s":"Union representatives met with management to ( ) better working conditions and higher wages for their members.","a":2,"o":["demand","reject","negotiate","accept"],"t":"労働組合の代表者は、組合員のためのより良い労働条件と高い賃金を交渉するために経営陣と会談した。","e":"<span class='fb-correct'>✓ 正解：negotiate</span>negotiate は「〜を交渉する・折り合いをつける」。negotiate a deal / negotiate a contract / negotiate terms は準1級ビジネス系の必須動詞。","tip":"💡 negotiate a deal（取引を交渉する）は頻出フレーズ"},{"s":"The effectiveness of the drug was found to ( ) significantly over time, requiring doctors to adjust dosages.","a":1,"o":["increase","diminish","improve","stabilize"],"t":"その薬の有効性は時間とともに著しく低下することがわかり、医師たちは投薬量を調整する必要があった。","e":"<span class='fb-correct'>✓ 正解：diminish</span>diminish は「〜が減少する・薄れる」。diminish in effectiveness / diminish over time。decrease より「価値・重要性が薄れる」ニュアンスが強い。","tip":"💡 diminish = decrease / decline（価値・効果が薄れる）"},{"s":"The city council voted to ( ) stricter noise regulations in residential areas to improve quality of life.","a":3,"o":["relax","review","ignore","enforce"],"t":"市議会は、生活の質を向上させるために住宅地における騒音規制の厳格化を施行するために投票した。","e":"<span class='fb-correct'>✓ 正解：enforce</span>enforce は「〜を施行する・執行する」。enforce a law / enforce regulations / enforce rules は準1級法律・社会系で最重要動詞。","tip":"💡 enforce a law（法律を施行・執行する）"},{"s":"As a child growing up in a small town, he always ( ) to work for an international organization and make a global impact.","a":0,"o":["aspired","refused","hesitated","struggled"],"t":"小さな町で育った子供として、彼は常に国際機関に勤め、世界に影響を与えることを熱望していた。","e":"<span class='fb-correct'>✓ 正解：aspired</span>aspire to〜 で「〜を切望する・熱望する」。aspire to be / aspire to work in〜 のように to不定詞が続く。ambitious dream を表す動詞として頻出。","tip":"💡 aspire to = strongly desire to（〜を熱望する）"},{"s":"Environmental groups have long ( ) for stricter regulations on carbon emissions from industrial factories.","a":2,"o":["argued","called","advocated","requested"],"t":"環境団体は長い間、工場からの炭素排出量に対するより厳しい規制を主張してきた。","e":"<span class='fb-correct'>✓ 正解：advocated</span>advocate for〜 で「〜を支持する・主張する」。advocate for change / advocate for human rights / advocate for reform は準1級社会・政治系で頻出。","tip":"💡 advocate for = campaign for（〜を支持・推進する）"},{"s":"The documentary aims to ( ) the daily struggles faced by refugees living in temporary camps along the border.","a":1,"o":["ignore","depict","exaggerate","minimize"],"t":"そのドキュメンタリーは、国境沿いの仮設キャンプに住む難民が直面する日々の苦闘を描写することを目指している。","e":"<span class='fb-correct'>✓ 正解：depict</span>depict は「〜を描写する・描く」。depict a situation / depict life / depict reality は文学・メディア系テーマで頻出。portray とほぼ同義。","tip":"💡 depict = portray（文章・映像で描写する）"},{"s":"The government decided to ( ) a travel ban on citizens entering from regions with high infection rates.","a":3,"o":["lift","recommend","oppose","impose"],"t":"政府は感染率が高い地域から入国する市民に対して渡航禁止令を課すことを決定した。","e":"<span class='fb-correct'>✓ 正解：impose</span>impose は「〜を課す・強制的に課す」。impose a tax / impose a ban / impose sanctions / impose restrictions は準1級政治・経済系の最頻出動詞。","tip":"💡 impose A on B（BにAを課す）は必須構文"},{"s":"Passengers are kindly asked to ( ) from using mobile phones during the performance for the comfort of others.","a":0,"o":["refrain","enjoy","continue","benefit"],"t":"他のお客様のために、上演中は携帯電話の使用を控えるようお願いします。","e":"<span class='fb-correct'>✓ 正解：refrain</span>refrain from doing で「〜を控える・慎む」。refrain from smoking / refrain from commenting は公的なアナウンスや丁寧な依頼で頻出。","tip":"💡 refrain from = avoid（控える・慎む）"},{"s":"The unexpected power outage threatened to ( ) the annual conference, forcing organizers to find an alternative venue.","a":2,"o":["improve","support","disrupt","enhance"],"t":"予期せぬ停電が年次会議を混乱させると危惧されたため、主催者たちは代替会場を探すことを余儀なくされた。","e":"<span class='fb-correct'>✓ 正解：disrupt</span>disrupt は「〜を混乱させる・妨害する」。disrupt a meeting / disrupt supply chains / disruptive technology（破壊的技術）の形でも頻出。","tip":"💡 disrupt = interrupt severely（大幅に混乱させる）"},{"s":"The witness's testimony appeared to ( ) the physical evidence presented by the prosecution in court.","a":1,"o":["support","contradict","confirm","strengthen"],"t":"証人の証言は、法廷で検察側が提示した物的証拠と矛盾しているように見えた。","e":"<span class='fb-correct'>✓ 正解：contradict</span>contradict は「〜と矛盾する・否定する」。contradict evidence / contradict a statement / contradict each other は準1級法律・論理系テーマで頻出。","tip":"💡 contradict = be inconsistent with（矛盾する）"},{"s":"The whistleblower revealed that the company had been attempting to ( ) evidence of its illegal waste disposal practices.","a":3,"o":["reveal","publicize","discover","conceal"],"t":"内部告発者は、その会社が違法な廃棄物処理の証拠を隠蔽しようとしていたことを暴露した。","e":"<span class='fb-correct'>✓ 正解：conceal</span>conceal は「〜を隠す・秘密にする」。conceal evidence / conceal information / conceal the truth。hide より公式・法的なニュアンスが強い。","tip":"💡 conceal = hide（より公式・法的な文脈）"},{"s":"Critics argue that successive governments have continued to ( ) the needs of rural communities in favor of urban development.","a":0,"o":["neglect","address","support","prioritize"],"t":"批評家たちは、歴代政府が都市開発を優先して農村コミュニティのニーズを軽視し続けてきたと主張している。","e":"<span class='fb-correct'>✓ 正解：neglect</span>neglect は「〜を軽視する・怠る」。neglect one's duties / neglect the environment / neglect health issues。ignore より「義務・責任を果たさない」含意が強い。","tip":"💡 neglect = fail to care for（怠慢・放置）"},{"s":"The government announced a series of tax cuts designed to ( ) economic growth and encourage business investment.","a":2,"o":["suppress","reduce","stimulate","weaken"],"t":"政府は経済成長を刺激し、企業投資を促すために設計された一連の減税措置を発表した。","e":"<span class='fb-correct'>✓ 正解：stimulate</span>stimulate は「〜を刺激する・活性化させる」。stimulate the economy / stimulate growth / stimulate innovation は準1級経済・ビジネス系の頻出動詞。","tip":"💡 stimulate the economy（経済を刺激する）は必須フレーズ"},{"s":"The factory was ordered to ( ) all production activities until safety inspectors could conduct a thorough investigation.","a":1,"o":["resume","cease","expand","continue"],"t":"安全検査員が徹底的な調査を行えるようになるまで、その工場はすべての生産活動を停止するよう命じられた。","e":"<span class='fb-correct'>✓ 正解：cease</span>cease は「〜を停止する・やめる」。cease operations / cease fire（停戦）/ cease to exist は準1級で頻出。stop より公式・書き言葉のニュアンス。","tip":"💡 cease = stop（より公式・法的な文脈）"},{"s":"The pilot was instructed not to ( ) from the approved flight path under any circumstances during the mission.","a":3,"o":["follow","maintain","adhere to","deviate"],"t":"パイロットはいかなる状況においても、任務中に承認されたフライトパスから逸脱しないように指示された。","e":"<span class='fb-correct'>✓ 正解：deviate</span>deviate from〜 で「〜から逸脱する・それる」。deviate from the plan / deviate from the norm / deviate from standard procedure は準1級で頻出。","tip":"💡 deviate from = depart from（基準・計画から逸れる）"}];
var cS='英検準1級の語彙は十分なレベルです。1級レベルの語彙強化に進みましょう。',cA='英検準1級合格圏内のレベルです。間違えた単語を例文ごと復習して完成度を高めましょう。',cB='もう少しで合格レベルです。高度な語彙を文脈の中で確認しながら覚え直しましょう。',cC='語彙強化が必要です。パス単準1級などで頻出語を例文ごと覚えることを推奨します。';
var cur=0,score=0,wrong=[],done=false;
function go(){cur=0;score=0;wrong=[];done=false;document.getElementById('s0').className='screen';document.getElementById('s1').className='screen active';render();}
function render(){
  done=false;var q=Q[cur],t=Q.length;
  document.getElementById('pc').textContent=(cur+1)+' / '+t;
  document.getElementById('sv').textContent='\u6b63\u89e3: '+score;
  document.getElementById('pf').style.width=((cur/t)*100)+'%';
  document.getElementById('qt').textContent='QUESTION '+(cur+1);
  document.getElementById('qs').innerHTML=q.s.replace('( )','<span class="bk">(\u3000\u3000\u3000)</span>');
  document.getElementById('qt2').textContent=q.t;
  var g=document.getElementById('og');g.innerHTML='';
  ['A','B','C','D'].forEach(function(l,i){
    var b=document.createElement('button');b.className='ob';
    b.innerHTML='<span class="ol">'+l+'</span> '+q.o[i];
    b.onclick=(function(idx){return function(){pick(idx);};})(i);
    g.appendChild(b);
  });
  var fb=document.getElementById('fb');fb.className='fb';fb.innerHTML='';
  var nb=document.getElementById('bn');nb.className='bn';
  nb.textContent=cur+1===t?'\u7d50\u679c\u3092\u898b\u308b':'\u6b21\u306e\u554f\u984c \u2192';
}
function pick(sel){
  if(done)return;done=true;var q=Q[cur];
  var bs=document.querySelectorAll('.ob');
  for(var i=0;i<bs.length;i++){bs[i].disabled=true;
    if(i===q.a)bs[i].classList.add('co');
    else if(i===sel&&sel!==q.a)bs[i].classList.add('wr');}
  var fb=document.getElementById('fb');
  if(sel===q.a){score++;document.getElementById('sv').textContent='\u6b63\u89e3: '+score;
    fb.innerHTML=q.e+'<span style="color:#94a3b8;font-size:12px;margin-top:6px;display:block;">'+q.tip+'</span>';}
  else{wrong.push({q:q,sel:sel});
    fb.innerHTML='<span style="color:#ef4444;font-weight:700;margin-bottom:6px;display:block;">\u2717 \u3042\u306a\u305f\u306e\u7b54\u3048\uff1a'+q.o[sel]+'</span>'+q.e+'<span style="color:#94a3b8;font-size:12px;margin-top:6px;display:block;">'+q.tip+'</span>';}
  fb.className='fb on';document.getElementById('bn').className='bn on';
}
function nxt(){cur++;if(cur>=Q.length)showResult();else render();}
function showResult(){
  document.getElementById('s1').className='screen';
  document.getElementById('s2').className='screen active';
  var t=Q.length,p=Math.round((score/t)*100),rank,rc,rb,com;
  if(p>=90){rank='S';rc='#f0b429';rb='rgba(240,180,41,0.2)';com=cS;}
  else if(p>=77){rank='A';rc='#22c55e';rb='rgba(34,197,94,0.2)';com=cA;}
  else if(p>=60){rank='B';rc='#3b82f6';rb='rgba(59,130,246,0.2)';com=cB;}
  else{rank='C';rc='#ef4444';rb='rgba(239,68,68,0.2)';com=cC;}
  document.getElementById('rk').textContent=rank;
  document.getElementById('rk').style.color=rc;
  document.getElementById('rs').textContent=t+'\u554f\u4e2d '+score+'\u554f\u6b63\u89e3\uff08\u6b63\u7b54\u7387 '+p+'%\uff09';
  var rl=document.getElementById('rl');
  rl.textContent={S:'\u512a\u79c0',A:'\u5408\u683c\u5708\u5185',B:'\u3082\u3046\u5c11\u3057',C:'\u8981\u5f37\u5316'}[rank];
  rl.style.cssText='background:'+rb+';color:'+rc+';border:1px solid '+rc;
  document.getElementById('cm').textContent=com;
  var mf=document.getElementById('mf');mf.style.background=rc;
  setTimeout(function(){mf.style.width=p+'%';},100);
  var rv=document.getElementById('rv');
  if(!wrong.length){rv.innerHTML='<div style="text-align:center;color:#22c55e;font-weight:700;padding:20px 0;">\uD83C\uDF89 \u5168\u554f\u6b63\u89e3\uff01\u7d20\u6674\u3089\u3057\u3044\uff01</div>';return;}
  var h='<div class="rv-title">\u2717 \u9593\u9055\u3048\u305f\u554f\u984c\uff08'+wrong.length+'\u554f\uff09</div>';
  for(var i=0;i<wrong.length;i++){
    var wq=wrong[i].q,ws=wrong[i].sel;
    var sent=wq.s.replace('( )','<span style="color:#f0b429;font-weight:700;">'+wq.o[wq.a]+'</span>');
    h+='<div class="ri"><div class="ri-s">'+sent+'</div><div><span class="ri-w">'+wq.o[ws]+'</span><span class="ri-c">\u2713 '+wq.o[wq.a]+'</span></div><div class="ri-t">'+wq.tip+'</div></div>';}
  rv.innerHTML=h;
}
function restart(){document.getElementById('s2').className='screen';document.getElementById('s0').className='screen active';}
