<script>
var Q=[{"s":"International agreements have been designed to ( ) the effects of climate change by limiting greenhouse gas emissions worldwide.","a":0,"o":["mitigate","accelerate","intensify","overlook"],"t":"温室効果ガスの排出を制限することで気候変動の影響を緩和するために、国際協定が設計されてきた。","e":"<span class='fb-correct'>✓ 正解：mitigate</span>mitigate は「〜を緩和する・軽減する」。mitigate the effects / mitigate risks / mitigate damage は環境・政策系で最頻出。reduce より「深刻な状況を和らげる」ニュアンスが強い。","tip":"💡 mitigate = reduce the severity of（〜を緩和する）"},{"s":"Industrial runoff has been found to ( ) nearby rivers, posing a serious threat to both aquatic life and drinking water supplies.","a":1,"o":["purify","contaminate","restore","protect"],"t":"工場排水が近くの川を汚染していることが判明し、水生生物や飲料水の供給に深刻な脅威をもたらしている。","e":"<span class='fb-correct'>✓ 正解：contaminate</span>contaminate は「〜を汚染する・毒する」。contaminate water / contaminate soil / contaminate food supply は環境・医療系で頻出。pollute より「有害物質で汚染する」意味が明確。","tip":"💡 contaminate = pollute with harmful substances（有害物質で汚染する）"},{"s":"Continued overfishing has begun to ( ) fish populations in the Pacific Ocean at an increasingly alarming rate.","a":2,"o":["increase","expand","deplete","restore"],"t":"漁業の乱獲が続き、太平洋の魚の個体数が驚くべきペースで枯渇し始めている。","e":"<span class='fb-correct'>✓ 正解：deplete</span>deplete は「〜を枯渇させる・消耗させる」。deplete resources / deplete stocks / deplete the ozone layer は環境系で頻出。depletion（名詞）も重要語。","tip":"💡 deplete = use up / exhaust（枯渇させる・使い果たす）"},{"s":"The national park authority introduced strict regulations to ( ) the area's unique wildlife and prevent further habitat destruction.","a":3,"o":["exploit","damage","destroy","conserve"],"t":"国立公園局はその地域の独特の野生生物を保護し、生息地のさらなる破壊を防ぐための厳しい規制を導入した。","e":"<span class='fb-correct'>✓ 正解：conserve</span>conserve は「〜を保護する・節約する」。conserve energy / conserve wildlife / conserve resources は環境・社会系で頻出。preserve と近いが、特に「天然資源・自然を守る」ニュアンスが強い。","tip":"💡 conserve = preserve carefully（大切に保護する・保全する）"},{"s":"Volunteers worked alongside scientists to ( ) the wetlands that had been drained for agricultural use over the previous century.","a":0,"o":["restore","demolish","abandon","monitor"],"t":"ボランティアたちは科学者と協力して、前世紀に農業利用のために排水された湿地を復元した。","e":"<span class='fb-correct'>✓ 正解：restore</span>restore は「〜を回復する・復元する」。restore ecosystems / restore habitats / restore balance は環境系で頻出。repair より「元の状態に戻す」という強い意味を持つ。","tip":"💡 restore = bring back to original condition（元の状態に復元する）"},{"s":"Environmental scientists are developing programs to ( ) invasive plant species that are threatening the balance of native ecosystems.","a":1,"o":["introduce","eradicate","protect","spread"],"t":"環境科学者たちは在来生態系のバランスを脅かしている外来植物種を根絶するためのプログラムを開発している。","e":"<span class='fb-correct'>✓ 正解：eradicate</span>eradicate は「〜を根絶する・完全に除去する」。eradicate invasive species / eradicate disease / eradicate poverty は科学・政策系で頻出。eliminate より「完全に根絶する」強い意味がある。","tip":"💡 eradicate = eliminate completely（根絶する・完全になくす）"},{"s":"Air quality in several major cities has continued to ( ) due to increased vehicle emissions and industrial activity in surrounding areas.","a":2,"o":["improve","stabilize","deteriorate","purify"],"t":"いくつかの大都市では、車両排気ガスと周辺の産業活動の増加により大気の質が悪化し続けている。","e":"<span class='fb-correct'>✓ 正解：deteriorate</span>deteriorate は「悪化する・低下する」。deteriorate rapidly / conditions deteriorated / water quality deteriorated は環境・医療系で頻出。worsen とほぼ同義だが、より書き言葉的。","tip":"💡 deteriorate = worsen / decline（悪化する・劣化する）"},{"s":"Forests play a vital role in helping to ( ) carbon dioxide from the atmosphere, making their protection essential in fighting climate change.","a":3,"o":["emit","release","produce","absorb"],"t":"森林は大気中の二酸化炭素を吸収するうえで重要な役割を果たしており、気候変動と戦ううえでその保護は不可欠だ。","e":"<span class='fb-correct'>✓ 正解：absorb</span>absorb は「〜を吸収する」。absorb CO2 / absorb carbon / absorb heat は環境・科学系で頻出。carbon absorption（炭素吸収）も重要な関連語。","tip":"💡 absorb = take in and hold（吸収する）↔ emit（放出する）"},{"s":"Plastic waste tends to ( ) in ocean gyres, forming massive patches that are extremely difficult and expensive to remove.","a":0,"o":["accumulate","dissolve","disappear","decompose"],"t":"プラスチックごみは海流の渦に蓄積する傾向があり、除去が非常に困難で費用のかかる巨大なパッチを形成する。","e":"<span class='fb-correct'>✓ 正解：accumulate</span>accumulate は「蓄積する・たまる」。accumulate over time / waste accumulates / toxins accumulate は環境・科学系で頻出。accumulation（名詞）も覚えよう。","tip":"💡 accumulate = build up gradually（徐々に蓄積する・たまる）"},{"s":"Many corporations are purchasing carbon credits to ( ) their greenhouse gas emissions as part of broader sustainability commitments.","a":1,"o":["increase","offset","ignore","generate"],"t":"多くの企業が持続可能性へのコミットメントの一環として、温室効果ガスの排出量を相殺するために炭素クレジットを購入している。","e":"<span class='fb-correct'>✓ 正解：offset</span>offset は「〜を相殺する・打ち消す」。offset carbon emissions / offset costs / offset the impact は環境・ビジネス系で頻出。carbon offset（カーボンオフセット）は重要語。","tip":"💡 offset = counterbalance / compensate for（相殺する・補う）"},{"s":"The city council voted to ban single-use plastics and encourage the use of ( ) packaging materials in all retail outlets.","a":2,"o":["synthetic","durable","biodegradable","conventional"],"t":"市議会は使い捨てプラスチックを禁止し、すべての小売店で生分解性の包装材の使用を促進することを決定した。","e":"<span class='fb-correct'>✓ 正解：biodegradable</span>biodegradable は「生分解性の・自然に分解される」。biodegradable packaging / biodegradable materials / fully biodegradable は環境系で頻出。bio（生物）＋ degrade（分解）で覚えよう。","tip":"💡 biodegradable = capable of being broken down naturally（自然に分解できる）"},{"s":"Investment in ( ) energy sources such as wind and solar power has increased dramatically across many developed nations in recent years.","a":3,"o":["fossil","nuclear","conventional","renewable"],"t":"風力や太陽光発電などの再生可能エネルギー源への投資が、近年多くの先進国で劇的に増加した。","e":"<span class='fb-correct'>✓ 正解：renewable</span>renewable は「再生可能な・繰り返し使える」。renewable energy / renewable resources / transition to renewable は環境系で超頻出。","tip":"💡 renewable energy = energy from naturally replenished sources（再生可能エネルギー）"},{"s":"Scientists warn that coral reefs are ( ) ecosystems that can be permanently damaged by even minor rises in ocean temperatures.","a":0,"o":["fragile","resilient","adaptable","stable"],"t":"科学者たちは、サンゴ礁は海水温のわずかな上昇でも永久的なダメージを受ける脆弱な生態系だと警告している。","e":"<span class='fb-correct'>✓ 正解：fragile</span>fragile は「壊れやすい・脆弱な」。fragile ecosystem / fragile balance / fragile environment は環境・科学系で頻出。delicate と似た意味だが、より「壊れやすさ」を強調する。","tip":"💡 fragile = easily damaged or broken（脆弱な・もろい）"},{"s":"Water is becoming increasingly ( ) in many arid regions, forcing governments to invest heavily in desalination and water recycling technology.","a":1,"o":["abundant","scarce","polluted","manageable"],"t":"多くの乾燥地域で水がますます希少になっており、政府に海水淡水化と水リサイクル技術への多大な投資を迫っている。","e":"<span class='fb-correct'>✓ 正解：scarce</span>scarce は「不足している・希少な」。scarce resources / become scarce / food is scarce は環境・経済系で頻出。scarcity（名詞）も重要語。","tip":"💡 scarce ↔ abundant（希少な ↔ 豊富な）"},{"s":"Scientists caution that beyond a certain temperature threshold, damage to the planet's climate system may become ( ).","a":2,"o":["temporary","gradual","irreversible","manageable"],"t":"科学者たちはある温度の閾値を超えると地球の気候システムへのダメージが不可逆的になる可能性があると警告している。","e":"<span class='fb-correct'>✓ 正解：irreversible</span>irreversible は「元に戻せない・不可逆的な」。irreversible damage / irreversible change / irreversible harm は環境・医療系で頻出。reverse（逆にする）＋ir（否定）で覚えよう。","tip":"💡 irreversible = cannot be undone or reversed（元に戻せない）"},{"s":"Without immediate global action, rising sea levels could have ( ) consequences for coastal communities and low-lying island nations.","a":3,"o":["minimal","gradual","temporary","catastrophic"],"t":"即時の世界的な対応がなければ、海面上昇は沿岸コミュニティや低地の島嶼国に壊滅的な影響をもたらす可能性がある。","e":"<span class='fb-correct'>✓ 正解：catastrophic</span>catastrophic は「壊滅的な・大惨事的な」。catastrophic consequences / catastrophic failure / catastrophic flooding は環境・政策系で頻出。","tip":"💡 catastrophic = extremely harmful or disastrous（壊滅的な）"},{"s":"The government has pledged to take ( ) measures to reduce the country's carbon footprint and meet its international climate commitments by 2030.","a":0,"o":["drastic","minor","gradual","conventional"],"t":"政府は2030年までに国の炭素フットプリントを削減し国際的な気候公約を達成するための抜本的な措置を取ることを約束した。","e":"<span class='fb-correct'>✓ 正解：drastic</span>drastic は「抜本的な・思い切った」。drastic measures / drastic action / drastic reduction は政策・環境系で頻出。radical と近いが、drastic は「急激で大きな変化」を強調する。","tip":"💡 drastic = extreme and sudden（抜本的な・急激な）"},{"s":"The remote island has remained ( ) for centuries, with no evidence of human settlement, development, or pollution of any kind.","a":1,"o":["populated","pristine","industrialized","contaminated"],"t":"その辺鄙な島は何世紀もの間手付かずのままで、人間の定住・開発・汚染の証拠は一切見られない。","e":"<span class='fb-correct'>✓ 正解：pristine</span>pristine は「手付かずの・清潔な・完璧な状態の」。pristine environment / pristine condition / pristine wilderness は環境・自然系で頻出。「汚れていない・損なわれていない」ことを強調する。","tip":"💡 pristine = clean and unspoiled（手付かずの・完全な状態の）"},{"s":"Decades of unsustainable farming practices have left large areas of the region completely ( ) and unable to support any crops.","a":2,"o":["fertile","productive","barren","cultivated"],"t":"何十年もの持続不可能な農業慣行により、その地域の広大なエリアが不毛な土地となり、作物を育てることができなくなった。","e":"<span class='fb-correct'>✓ 正解：barren</span>barren は「不毛の・（土地が）何も育たない」。barren land / barren soil / barren landscape は環境・農業系で頻出。fertile（肥沃な）との対比で覚えよう。","tip":"💡 barren ↔ fertile（不毛の ↔ 肥沃な）"},{"s":"Authorities discovered that the company had been illegally dumping ( ) chemicals in an area near residential neighborhoods for several years.","a":3,"o":["harmless","biodegradable","natural","toxic"],"t":"当局は、その会社が数年間にわたって住宅地付近に有毒化学物質を違法投棄していたことを発見した。","e":"<span class='fb-correct'>✓ 正解：toxic</span>toxic は「有毒な・毒性のある」。toxic chemicals / toxic waste / toxic substances は環境・医療系で超頻出。toxin（毒素）、toxicity（毒性）も重要語。","tip":"💡 toxic = poisonous / harmful（有毒な・毒性のある）"},{"s":"The introduction of non-native predators can disrupt the entire ( ) by eliminating species that play critical roles in the food chain.","a":0,"o":["ecosystem","atmosphere","landscape","climate"],"t":"外来の捕食者の導入は食物連鎖において重要な役割を果たす種を排除することで生態系全体を混乱させる可能性がある。","e":"<span class='fb-correct'>✓ 正解：ecosystem</span>ecosystem は「生態系」。delicate ecosystem / marine ecosystem / protect the ecosystem は環境系で超頻出。eco（生態）+ system（システム）として理解しよう。","tip":"💡 ecosystem = community of living organisms and their environment（生態系）"},{"s":"The rate of ( ) in tropical regions has accelerated dramatically, threatening both regional biodiversity and the stability of the global climate.","a":1,"o":["reforestation","deforestation","conservation","urbanization"],"t":"熱帯地域での森林破壊の速度は劇的に加速しており、地域の生物多様性と地球の気候の安定性の両方を脅かしている。","e":"<span class='fb-correct'>✓ 正解：deforestation</span>deforestation は「森林破壊・森林伐採」。tropical deforestation / halt deforestation / deforestation rates は環境系で超頻出。de（除去）+ forest（森林）+ ation（名詞化）で構成。","tip":"💡 deforestation ↔ reforestation（森林破壊 ↔ 植林）"},{"s":"Protecting ( ) is essential for maintaining the ecological balance that all living organisms on Earth ultimately depend upon.","a":2,"o":["productivity","sustainability","biodiversity","conservation"],"t":"地球上のすべての生物が依存する生態学的バランスを維持するためには、生物多様性を保護することが不可欠だ。","e":"<span class='fb-correct'>✓ 正解：biodiversity</span>biodiversity は「生物多様性」。protect biodiversity / loss of biodiversity / rich biodiversity は環境系で超頻出。bio（生物）+ diversity（多様性）で構成される重要語。","tip":"💡 biodiversity = variety of life on Earth（地球上の生命の多様性）"},{"s":"Climate models predict that ( ) patterns will become increasingly unpredictable, with some regions experiencing severe and prolonged drought.","a":3,"o":["evaporation","humidity","temperature","precipitation"],"t":"気候モデルは一部の地域が深刻で長引く干ばつを経験するなど、降水パターンがますます予測不可能になると予測している。","e":"<span class='fb-correct'>✓ 正解：precipitation</span>precipitation は「降水量・降雨」。increased precipitation / annual precipitation / precipitation patterns は気候・環境系で頻出。rainfall とほぼ同義だが、雪や霙なども含む学術的な表現。","tip":"💡 precipitation = water falling as rain, snow, or sleet（降水・降雨量）"},{"s":"Coastal ( ) has become a growing concern as rising sea levels and intense storm surges gradually destroy shoreline habitats.","a":0,"o":["erosion","conservation","expansion","restoration"],"t":"海面上昇や激しい嵐による高波が沿岸の生息地を徐々に破壊するにつれ、海岸浸食が深刻化している。","e":"<span class='fb-correct'>✓ 正解：erosion</span>erosion は「浸食・侵食」。soil erosion / coastal erosion / wind erosion は環境・地理系で頻出。erode（動詞）も重要語。","tip":"💡 erosion = gradual wearing away by water, wind, or ice（浸食・侵食）"},{"s":"Experts warn that thousands of plant and animal species face ( ) within the next century if current rates of habitat loss continue.","a":1,"o":["survival","extinction","adaptation","recovery"],"t":"生息地喪失の現在のペースが続けば今後1世紀以内に何千種もの動植物が絶滅に直面すると専門家たちは警告している。","e":"<span class='fb-correct'>✓ 正解：extinction</span>extinction は「絶滅」。face extinction / mass extinction / extinction of species は環境系で超頻出。extinct（形容詞）も合わせて覚えよう。","tip":"💡 extinction = complete disappearance of a species（種の絶滅）"},{"s":"Urban expansion is destroying the natural ( ) of many species, forcing wildlife into increasingly small and isolated areas of land.","a":2,"o":["territory","landscape","habitat","region"],"t":"都市の拡大は多くの種の自然な生息地を破壊し、野生動物をますます小さく孤立した土地へと追い込んでいる。","e":"<span class='fb-correct'>✓ 正解：habitat</span>habitat は「生息地・（生物の）居場所」。natural habitat / loss of habitat / habitat destruction は環境・生物系で超頻出。","tip":"💡 habitat = natural home of a species（生物の自然な生息地）"},{"s":"The transportation sector is responsible for a significant proportion of total global greenhouse gas ( ) produced each year.","a":3,"o":["absorption","reduction","conservation","emissions"],"t":"輸送部門は毎年生産される世界の温室効果ガス総排出量のかなりの割合を占めている。","e":"<span class='fb-correct'>✓ 正解：emissions</span>emissions は「排出量（複数形）」。greenhouse gas emissions / carbon emissions / reduce emissions は環境・政策系で超頻出。emit（動詞）→ emission（名詞）の形も覚えよう。","tip":"💡 emissions = gases or pollutants released into the atmosphere（排出量）"},{"s":"Land ( ) caused by overgrazing and poor management practices threatens food security in many regions across the developing world.","a":0,"o":["degradation","preservation","conservation","restoration"],"t":"過放牧と不適切な管理慣行による土地の劣化は、途上国の多くの地域で食料安全保障を脅かしている。","e":"<span class='fb-correct'>✓ 正解：degradation</span>degradation は「劣化・悪化・環境破壊」。land degradation / environmental degradation / soil degradation は環境系で頻出。degrade（動詞）→ degradation（名詞）。","tip":"💡 degradation = process of worsening or declining quality（劣化・品質の低下）"},{"s":"Scientists advocate large-scale ( ) programs to help recover lost forest cover and significantly increase global carbon storage capacity.","a":1,"o":["exploitation","reforestation","destruction","development"],"t":"科学者たちは失われた森林被覆を回復し、世界全体の炭素貯蔵能力を大幅に高めるための大規模な植林プログラムを支持している。","e":"<span class='fb-correct'>✓ 正解：reforestation</span>reforestation は「植林・森林再生」。large-scale reforestation / reforestation program / promote reforestation は環境系で頻出。deforestation（森林破壊）との対語として重要。","tip":"💡 reforestation = replanting trees in deforested areas（植林・森林再生）"}];
var cS='英検準1級の語彙は十分なレベルです。1級レベルの語彙強化に進みましょう。',cA='英検準1級合格圏内のレベルです。間違えた単語を例文ごと復習して完成度を高めましょう。',cB='もう少しで合格レベルです。高度な語彙を文脈の中で確認しながら覚え直しましょう。',cC='語彙強化が必要です。パス単準1級などで頻出語を例文ごと覚えることを推奨します。';
var cur=0,score=0,wrong=[],done=false;
function go(){cur=0;score=0;wrong=[];done=false;document.getElementById('s0').className='screen';document.getElementById('s1').className='screen active';render();}
function render(){done=false;var q=Q[cur],t=Q.length;
  document.getElementById('pc').textContent=(cur+1)+' / '+t;
  document.getElementById('sv').textContent='\u6b63\u89e3: '+score;
  document.getElementById('pf').style.width=((cur/t)*100)+'%';
  document.getElementById('qt').textContent='QUESTION '+(cur+1);
  document.getElementById('qs').innerHTML=q.s.replace('( )','<span class="bk">(\u3000\u3000\u3000)</span>');
  document.getElementById('qt2').textContent=q.t;
  var g=document.getElementById('og');g.innerHTML='';
  ['A','B','C','D'].forEach(function(l,i){
    var b=document.createElement('button');b.className='ob';
    b.innerHTML='<span class="ol">'+l+'</span> '+q.o[i];
    b.onclick=(function(idx){return function(){pick(idx);};})(i);
    g.appendChild(b);});
  var fb=document.getElementById('fb');fb.className='fb';fb.innerHTML='';
  var nb=document.getElementById('bn');nb.className='bn';
  nb.textContent=cur+1===t?'\u7d50\u679c\u3092\u898b\u308b':'\u6b21\u306e\u554f\u984c \u2192';}
function pick(sel){if(done)return;done=true;var q=Q[cur];
  var bs=document.querySelectorAll('.ob');
  for(var i=0;i<bs.length;i++){bs[i].disabled=true;
    if(i===q.a)bs[i].classList.add('co');
    else if(i===sel&&sel!==q.a)bs[i].classList.add('wr');}
  var fb=document.getElementById('fb');
  if(sel===q.a){score++;document.getElementById('sv').textContent='\u6b63\u89e3: '+score;
    fb.innerHTML=q.e+'<span style="color:#94a3b8;font-size:12px;margin-top:6px;display:block;">'+q.tip+'</span>';}
  else{wrong.push({q:q,sel:sel});
    fb.innerHTML='<span style="color:#ef4444;font-weight:700;margin-bottom:6px;display:block;">\u2717 \u3042\u306a\u305f\u306e\u7b54\u3048\uff1a'+q.o[sel]+'</span>'+q.e+'<span style="color:#94a3b8;font-size:12px;margin-top:6px;display:block;">'+q.tip+'</span>';}
  fb.className='fb on';document.getElementById('bn').className='bn on';}
function nxt(){cur++;if(cur>=Q.length)showResult();else render();}
function showResult(){
  document.getElementById('s1').className='screen';
  document.getElementById('s2').className='screen active';
  var t=Q.length,p=Math.round((score/t)*100),rank,rc,rb,com;
  if(p>=90){rank='S';rc='#f0b429';rb='rgba(240,180,41,0.2)';com=cS;}
  else if(p>=77){rank='A';rc='#22c55e';rb='rgba(34,197,94,0.2)';com=cA;}
  else if(p>=60){rank='B';rc='#3b82f6';rb='rgba(59,130,246,0.2)';com=cB;}
  else{rank='C';rc='#ef4444';rb='rgba(239,68,68,0.2)';com=cC;}
  document.getElementById('rk').textContent=rank;
  document.getElementById('rk').style.color=rc;
  document.getElementById('rs').textContent=t+'\u554f\u4e2d '+score+'\u554f\u6b63\u89e3\uff08\u6b63\u7b54\u7387 '+p+'%\uff09';
  var rl=document.getElementById('rl');
  var rlTxt={S:'\u512a\u79c0',A:'\u5408\u683c\u5708\u5185',B:'\u3082\u3046\u5c11\u3057',C:'\u8981\u5f37\u5316'};
  rl.textContent=rlTxt[rank];
  rl.style.cssText='background:'+rb+';color:'+rc+';border:1px solid '+rc;
  document.getElementById('cm').textContent=com;
  var mf=document.getElementById('mf');mf.style.background=rc;
  setTimeout(function(){mf.style.width=p+'%';},100);
  var rv=document.getElementById('rv');
  if(!wrong.length){rv.innerHTML='<div style="text-align:center;color:#22c55e;font-weight:700;padding:20px 0;">\uD83C\uDF89 \u5168\u554f\u6b63\u89e3\uff01\u7d20\u6674\u3089\u3057\u3044\uff01</div>';return;}
  var h='<div class="rv-title">\u2717 \u9593\u9055\u3048\u305f\u554f\u984c\uff08'+wrong.length+'\u554f\uff09</div>';
  for(var i=0;i<wrong.length;i++){
    var wq=wrong[i].q,ws=wrong[i].sel;
    var sent=wq.s.replace('( )','<span style="color:#f0b429;font-weight:700;">'+wq.o[wq.a]+'</span>');
    h+='<div class="ri"><div class="ri-s">'+sent+'</div>';
    h+='<div><span class="ri-w">'+wq.o[ws]+'</span><span class="ri-c">\u2713 '+wq.o[wq.a]+'</span></div>';
    h+='<div class="ri-t">'+wq.tip+'</div></div>';}
  rv.innerHTML=h;}
function restart(){document.getElementById('s2').className='screen';document.getElementById('s0').className='screen active';}
