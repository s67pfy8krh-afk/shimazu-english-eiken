= control by means of rules（規制する・取り締まる）"},{"s":"Historical policies that sought to ( ) communities by race have left lasting social and economic consequences that persist to this day.","a":2,"o":["unite","integrate","segregate","empower"],"t":"人種によってコミュニティを隔離しようとした歴史的な政策は今日まで続く持続的な社会的・経済的影響を残している。","e":"<span class='fb-correct'>✓ 正解：segregate</span>segregate は「〜を分離する・隔離する」。racially segregated / segregate by race / segregate communities は社会・歴史系で頻出。segregation（名詞）とセットで覚えよう。","tip":"💡 segregate = separate groups of people（分離する・隔離する）"},{"s":"The state agreed to ( ) public transportation in rural areas to ensure that residents without private vehicles could still access essential services.","a":3,"o":["privatize","deregulate","eliminate","subsidize"],"t":"州は車のない住民が必要なサービスにアクセスできるよう農村部の公共交通機関に補助金を出すことに同意した。","e":"<span class='fb-correct'>✓ 正解：subsidize</span>subsidize は「〜に補助金を出す・助成する」。subsidize education / subsidize healthcare / publicly subsidized は政策・経済系で頻出。subsidy（名詞）も重要語。","tip":"💡 subsidize = support financially with public money（補助金を出す・助成する）"},{"s":"Labor unions are calling on the government to ( ) the pension system to make it more equitable for low-income and part-time workers.","a":0,"o":["reform","maintain","abandon","worsen"],"t":"労働組合は低所得労働者やパートタイム労働者にとってより公平なものにするために年金制度を改革するよう政府に求めている。","e":"<span class='fb-correct'>✓ 正解：reform</span>reform は「〜を改革する・改善する」。reform the system / reform education / reform policies は政治・社会系で超頻出。reform（名詞）としても使われる。","tip":"💡 reform = make changes to improve something（改革する・改善する）"},{"s":"Critics argue that economic policies have continued to ( ) the poorest members of society rather than addressing the root causes of poverty.","a":1,"o":["support","marginalize","empower","prioritize"],"t":"批評家たちは経済政策が貧困の根本原因に対処するのではなく社会の最も貧しい人々を周縁化し続けていると主張している。","e":"<span class='fb-correct'>✓ 正解：marginalize</span>marginalize は「〜を周縁化する・社会から排除する」。marginalize communities / marginalize minorities / feel marginalized は社会系で頻出。","tip":"💡 marginalize = treat as unimportant or exclude from society（周縁化する・排除する）"},{"s":"Several journalists were arrested after the government moved to ( ) independent media reports covering the scale of the political demonstrations.","a":2,"o":["broadcast","publish","censor","distribute"],"t":"政府が政治デモの規模を伝える独立系メディアの報道を検閲しようとした後、数人のジャーナリストが逮捕された。","e":"<span class='fb-correct'>✓ 正解：censor</span>censor は「〜を検閲する・削除する」。censor the press / censor content / censored by the government は政治・メディア系で頻出。censorship（名詞）も重要語。","tip":"💡 censor = suppress or remove parts of communication（検閲する）"},{"s":"The international agreement will only take effect once a sufficient number of member nations formally ( ) the treaty through their national parliaments.","a":3,"o":["draft","oppose","reject","ratify"],"t":"その国際協定は十分な数の加盟国が議会を通じて条約を正式に批准して初めて発効する。","e":"<span class='fb-correct'>✓ 正解：ratify</span>ratify は「〜を批准する・正式に承認する」。ratify a treaty / ratify an agreement / ratified by parliament は国際法・政治系で頻出。ratification（名詞）も重要語。","tip":"💡 ratify = formally approve a treaty or agreement（批准する・正式に承認する）"},{"s":"The government announced that formal education would be made ( ) for all children between the ages of five and sixteen without exception.","a":0,"o":["compulsory","optional","voluntary","beneficial"],"t":"政府は5歳から16歳のすべての子供に対して例外なく正規教育を義務教育とすることを発表した。","e":"<span class='fb-correct'>✓ 正解：compulsory</span>compulsory は「義務的な・強制的な」。compulsory education / compulsory military service / compulsory attendance は社会・法律系で頻出。mandatory とほぼ同義。","tip":"💡 compulsory = required by law or rules（義務的な・強制的な）"},{"s":"Advocates argue that the tax system must be redesigned to ensure a more ( ) distribution of wealth that benefits people at all income levels.","a":1,"o":["unequal","equitable","regressive","uniform"],"t":"支持者たちはすべての所得水準の人々に恩恵をもたらすより公平な富の分配を確保するために税制を再設計しなければならないと主張している。","e":"<span class='fb-correct'>✓ 正解：equitable</span>equitable は「公平な・公正な」。equitable distribution / equitable access / equitable treatment は社会・法律系で頻出。equal（平等な）より「状況に応じた公正さ」を含意する。","tip":"💡 equitable = fair and just（公平な・公正な）"},{"s":"Traditional organizations tend to have ( ) management structures where authority and decisions flow from the top down through multiple levels.","a":2,"o":["democratic","flexible","hierarchical","decentralized"],"t":"伝統的な組織は権限と意思決定が複数の層を通じて上から下へと流れる階層的な管理構造を持つ傾向がある。","e":"<span class='fb-correct'>✓ 正解：hierarchical</span>hierarchical は「階層的な・ヒエラルキーの」。hierarchical structure / hierarchical society / hierarchical organization は社会・ビジネス系で頻出。hierarchy（名詞）も重要語。","tip":"💡 hierarchical = organized in levels of rank or authority（階層的な）"},{"s":"The constitution establishes a ( ) state in which the government operates entirely independently of any religious institution or doctrine.","a":3,"o":["theocratic","religious","faith-based","secular"],"t":"憲法は政府がいかなる宗教機関や教義とも完全に独立して運営される政教分離国家を確立している。","e":"<span class='fb-correct'>✓ 正解：secular</span>secular は「世俗的な・宗教と分離した」。secular state / secular education / secular society は政治・宗教系で頻出。secularism（名詞）も重要語。","tip":"💡 secular ↔ religious（世俗的な ↔ 宗教的な）"},{"s":"Critics argued that the application process for public assistance was overly ( ) and prevented many eligible families from accessing the help they needed.","a":0,"o":["stringent","efficient","straightforward","streamlined"],"t":"批評家たちは公的支援の申請プロセスが過度に厳格であり多くの資格を持つ家族が必要な支援を受けるのを妨げていると主張した。","e":"<span class='fb-correct'>✓ 正解：stringent</span>stringent は「厳しい・厳格な」。stringent regulations / stringent requirements / stringent standards は法律・政策系で頻出。strict とほぼ同義だが、より書き言葉的な表現。","tip":"💡 stringent = very strict and demanding（厳しい・厳格な）"},{"s":"The festival organizers worked hard to create an ( ) event that welcomed participants of all backgrounds, abilities, and ages without exception.","a":1,"o":["exclusive","inclusive","selective","restricted"],"t":"フェスティバルの主催者はあらゆる背景・能力・年齢の参加者を例外なく歓迎する包括的なイベントを作るために懸命に取り組んだ。","e":"<span class='fb-correct'>✓ 正解：inclusive</span>inclusive は「包括的な・すべてを含む」。inclusive education / inclusive policy / inclusive environment は教育・社会系で超頻出。inclusion（名詞）も重要語。","tip":"💡 inclusive = including everyone regardless of differences（包括的な・誰でも参加できる）"},{"s":"The report is considered the most ( ) source on the subject, having been compiled by leading experts from more than thirty countries.","a":2,"o":["biased","unreliable","authoritative","speculative"],"t":"その報告書は30か国以上の第一線の専門家によって編集されており、この分野の最も権威ある情報源とみなされている。","e":"<span class='fb-correct'>✓ 正解：authoritative</span>authoritative は「権威ある・信頼できる」。authoritative source / authoritative report / authoritative guidance は学術・メディア系で頻出。authority（名詞）→ authoritative（形容詞）。","tip":"💡 authoritative = recognized as reliable and accurate（権威ある・信頼できる）"},{"s":"Attendance at the briefing is ( ) for all department heads and cannot be substituted by simply reviewing the meeting notes afterward.","a":3,"o":["optional","voluntary","recommended","mandatory"],"t":"ブリーフィングへの出席はすべての部門長にとって義務的であり後から会議メモを確認することで代替することはできない。","e":"<span class='fb-correct'>✓ 正解：mandatory</span>mandatory は「義務的な・強制的な」。mandatory requirement / mandatory training / make mandatory は法律・ビジネス系で超頻出。compulsory とほぼ同義だが、mandatory は法的・公式な文脈で特に使われる。","tip":"💡 mandatory = required by authority or law（義務的な）"},{"s":"The president's increasingly ( ) style of governance alarmed observers who noted that political opposition was being systematically silenced.","a":0,"o":["autocratic","democratic","participatory","transparent"],"t":"野党が組織的に沈黙させられていることに気づいた観察者たちは大統領の独裁的なガバナンスのスタイルが増していることに警戒した。","e":"<span class='fb-correct'>✓ 正解：autocratic</span>autocratic は「独裁的な・専制的な」。autocratic ruler / autocratic government / autocratic leadership は政治系で頻出。autocracy（名詞）も重要語。","tip":"💡 autocratic = having total power without democratic limits（独裁的な・専制的な）"},{"s":"The government passed legislation to protect the land rights of ( ) communities and preserve their cultural practices for future generations.","a":1,"o":["foreign","indigenous","immigrant","colonial"],"t":"政府は先住民のコミュニティの土地権を保護し将来の世代のために彼らの文化的慣行を保存するための法律を可決した。","e":"<span class='fb-correct'>✓ 正解：indigenous</span>indigenous は「先住民の・原産の」。indigenous people / indigenous rights / indigenous knowledge は社会・政治系で超頻出。native と近いが、より公式・学術的な表現。","tip":"💡 indigenous = native to a particular place（先住民の・その土地原産の）"},{"s":"Improving ( ) rates among adults in developing nations is widely seen as one of the most effective long-term strategies for reducing poverty.","a":2,"o":["enrollment","attendance","literacy","graduation"],"t":"途上国における成人の識字率を向上させることは長期的に貧困を削減するための最も効果的な戦略の一つとして広く認識されている。","e":"<span class='fb-correct'>✓ 正解：literacy</span>literacy は「識字能力・リテラシー」。literacy rate / digital literacy / improve literacy は教育・社会系で超頻出。literate（形容詞）も重要語。","tip":"💡 literacy = ability to read and write（識字能力・読み書き能力）"},{"s":"The education board is reviewing the national ( ) to ensure it adequately prepares students for the rapidly changing demands of the modern job market.","a":3,"o":["semester","assessment","examination","curriculum"],"t":"教育委員会は急速に変化する現代の雇用市場の需要に向けて生徒を十分に準備させるために国のカリキュラムを見直している。","e":"<span class='fb-correct'>✓ 正解：curriculum</span>curriculum は「カリキュラム・教育課程」。national curriculum / school curriculum / curriculum reform は教育系で超頻出。","tip":"💡 curriculum = subjects and content taught at a school（カリキュラム・教育課程）"},{"s":"Many educators advocate giving students greater ( ) in choosing how they learn, arguing it improves both motivation and long-term academic performance.","a":0,"o":["autonomy","restriction","supervision","dependency"],"t":"多くの教育者は動機と長期的な学業成績の両方を向上させるとして生徒が学び方を選ぶ際により大きな自律性を与えることを支持している。","e":"<span class='fb-correct'>✓ 正解：autonomy</span>autonomy は「自律性・自治・自立」。student autonomy / regional autonomy / political autonomy は教育・政治系で超頻出。autonomous（形容詞）も重要語。","tip":"💡 autonomy = freedom to make your own decisions（自律性・自立・自治）"},{"s":"The billionaire's commitment to ( ) has resulted in billions of dollars being donated annually to education and healthcare initiatives around the world.","a":1,"o":["investment","philanthropy","lobbying","speculation"],"t":"その億万長者の慈善活動への取り組みにより世界中の教育と医療の取り組みに毎年数十億ドルが寄付されている。","e":"<span class='fb-correct'>✓ 正解：philanthropy</span>philanthropy は「慈善活動・博愛主義」。corporate philanthropy / act of philanthropy / philanthropist（慈善家）は社会・ビジネス系で頻出。","tip":"💡 philanthropy = charitable giving to improve human welfare（慈善活動・博愛主義）"},{"s":"Small business owners frequently cite excessive ( ) as one of the most significant obstacles they face when starting and growing a new enterprise.","a":2,"o":["regulation","legislation","bureaucracy","taxation"],"t":"中小企業のオーナーは過剰な官僚主義を新しい企業を設立・拡大する際に直面する最も重要な障害の一つとして頻繁に挙げる。","e":"<span class='fb-correct'>✓ 正解：bureaucracy</span>bureaucracy は「官僚制度・官僚主義」。cut through bureaucracy / excessive bureaucracy / government bureaucracy は政治・ビジネス系で頻出。bureaucratic（形容詞）とセットで覚えよう。","tip":"💡 bureaucracy = system with excessive rules and procedures（官僚制度・煩雑な手続き）"},{"s":"The political party's ( ) is based on a combination of free-market economics and traditional social values that appeal to a wide range of voters.","a":3,"o":["strategy","rhetoric","platform","ideology"],"t":"その政党のイデオロギーは幅広い有権者に訴える自由市場経済と伝統的な社会的価値観の組み合わせに基づいている。","e":"<span class='fb-correct'>✓ 正解：ideology</span>ideology は「イデオロギー・思想体系」。political ideology / dominant ideology / ideological differences は政治・社会系で超頻出。ideological（形容詞）も重要語。","tip":"💡 ideology = system of beliefs and values（思想体系・イデオロギー）"},{"s":"The debate over national ( ) has intensified as international courts increasingly seek to hold governments accountable for human rights violations.","a":0,"o":["sovereignty","democracy","equality","transparency"],"t":"国際裁判所が人権侵害について政府に対して責任を追及しようとするにつれ国家主権をめぐる議論が激化している。","e":"<span class='fb-correct'>✓ 正解：sovereignty</span>sovereignty は「主権・国家の独立性」。national sovereignty / respect sovereignty / territorial sovereignty は国際政治系で超頻出。sovereign（形容詞）も重要語。","tip":"💡 sovereignty = supreme authority over a territory（主権・国家主権）"},{"s":"Economic ( ) from rural to urban areas has created immense pressure on city infrastructure and contributed to housing shortages across many countries.","a":1,"o":["urbanization","migration","segregation","assimilation"],"t":"農村部から都市部への経済的な移住は都市のインフラに多大な圧力をかけ多くの国で住宅不足の一因となっている。","e":"<span class='fb-correct'>✓ 正解：migration</span>migration は「移住・移動」。economic migration / mass migration / rural-urban migration は社会・政治系で超頻出。migrate（動詞）→ migration（名詞）。","tip":"💡 migration = movement of people from one place to another（移住・人口移動）"},{"s":"The civil rights movement emerged as a direct response to decades of systematic ( ) that denied basic rights to entire segments of the population.","a":2,"o":["liberation","freedom","oppression","equality"],"t":"公民権運動は人口の特定の集団全体に基本的権利を否定してきた数十年にわたる組織的な抑圧への直接的な反応として生まれた。","e":"<span class='fb-correct'>✓ 正解：oppression</span>oppression は「抑圧・弾圧」。systemic oppression / political oppression / fight oppression は社会・政治系で頻出。oppress（動詞）→ oppression（名詞）。","tip":"💡 oppression = unjust use of power to control others（抑圧・弾圧）"},{"s":"The campaign for women's ( ) in the early twentieth century was one of the most significant and transformative social movements in modern history.","a":3,"o":["literacy","autonomy","ideology","suffrage"],"t":"20世紀初頭の女性参政権運動は近代史において最も重要で変革的な社会運動の一つだった。","e":"<span class='fb-correct'>✓ 正解：suffrage</span>suffrage は「参政権・選挙権」。women's suffrage / universal suffrage / suffrage movement は社会・歴史系で頻出。","tip":"💡 suffrage = the right to vote in elections（参政権・選挙権）"}];
var cS='英検準1級の語彙は十分なレベルです。1級レベルの語彙強化に進みましょう。',cA='英検準1級合格圏内のレベルです。間違えた単語を例文ごと復習して完成度を高めましょう。',cB='もう少しで合格レベルです。高度な語彙を文脈の中で確認しながら覚え直しましょう。',cC='語彙強化が必要です。パス単準1級などで頻出語を例文ごと覚えることを推奨します。';
var cur=0,score=0,wrong=[],done=false;
function go(){cur=0;score=0;wrong=[];done=false;document.getElementById('s0').className='screen';document.getElementById('s1').className='screen active';render();}
function render(){done=false;var q=Q[cur],t=Q.length;
  document.getElementById('pc').textContent=(cur+1)+' / '+t;
  document.getElementById('sv').textContent='\u6b63\u89e3: '+score;
  document.getElementById('pf').style.width=((cur/t)*100)+'%';
  document.getElementById('qt').textContent='QUESTION '+(cur+1);
  document.getElementById('qs').innerHTML=q.s.replace('( )','<span class="bk">(\u3000\u3000\u3000)</span>');
  document.getElementById('qt2').textContent=q.t;
  var g=document.getElementById('og');g.innerHTML='';
  ['A','B','C','D'].forEach(function(l,i){
    var b=document.createElement('button');b.className='ob';
    b.innerHTML='<span class="ol">'+l+'</span> '+q.o[i];
    b.onclick=(function(idx){return function(){pick(idx);};})(i);
    g.appendChild(b);});
  var fb=document.getElementById('fb');fb.className='fb';fb.innerHTML='';
  var nb=document.getElementById('bn');nb.className='bn';
  nb.textContent=cur+1===t?'\u7d50\u679c\u3092\u898b\u308b':'\u6b21\u306e\u554f\u984c \u2192';}
function pick(sel){if(done)return;done=true;var q=Q[cur];
  var bs=document.querySelectorAll('.ob');
  for(var i=0;i<bs.length;i++){bs[i].disabled=true;
    if(i===q.a)bs[i].classList.add('co');
    else if(i===sel&&sel!==q.a)bs[i].classList.add('wr');}
  var fb=document.getElementById('fb');
  if(sel===q.a){score++;document.getElementById('sv').textContent='\u6b63\u89e3: '+score;
    fb.innerHTML=q.e+'<span style="color:#94a3b8;font-size:12px;margin-top:6px;display:block;">'+q.tip+'</span>';}
  else{wrong.push({q:q,sel:sel});
    fb.innerHTML='<span style="color:#ef4444;font-weight:700;margin-bottom:6px;display:block;">\u2717 \u3042\u306a\u305f\u306e\u7b54\u3048\uff1a'+q.o[sel]+'</span>'+q.e+'<span style="color:#94a3b8;font-size:12px;margin-top:6px;display:block;">'+q.tip+'</span>';}
  fb.className='fb on';document.getElementById('bn').className='bn on';}
function nxt(){cur++;if(cur>=Q.length)showResult();else render();}
function showResult(){
  document.getElementById('s1').className='screen';
  document.getElementById('s2').className='screen active';
  var t=Q.length,p=Math.round((score/t)*100),rank,rc,rb,com;
  if(p>=90){rank='S';rc='#f0b429';rb='rgba(240,180,41,0.2)';com=cS;}
  else if(p>=77){rank='A';rc='#22c55e';rb='rgba(34,197,94,0.2)';com=cA;}
  else if(p>=60){rank='B';rc='#3b82f6';rb='rgba(59,130,246,0.2)';com=cB;}
  else{rank='C';rc='#ef4444';rb='rgba(239,68,68,0.2)';com=cC;}
  document.getElementById('rk').textContent=rank;
  document.getElementById('rk').style.color=rc;
  document.getElementById('rs').textContent=t+'\u554f\u4e2d '+score+'\u554f\u6b63\u89e3\uff08\u6b63\u7b54\u7387 '+p+'%\uff09';
  var rl=document.getElementById('rl');
  var rlTxt={S:'\u512a\u79c0',A:'\u5408\u683c\u5708\u5185',B:'\u3082\u3046\u5c11\u3057',C:'\u8981\u5f37\u5316'};
  rl.textContent=rlTxt[rank];
  rl.style.cssText='background:'+rb+';color:'+rc+';border:1px solid '+rc;
  document.getElementById('cm').textContent=com;
  var mf=document.getElementById('mf');mf.style.background=rc;
  setTimeout(function(){mf.style.width=p+'%';},100);
  var rv=document.getElementById('rv');
  if(!wrong.length){rv.innerHTML='<div style="text-align:center;color:#22c55e;font-weight:700;padding:20px 0;">\uD83C\uDF89 \u5168\u554f\u6b63\u89e3\uff01\u7d20\u6674\u3089\u3057\u3044\uff01</div>';return;}
  var h='<div class="rv-title">\u2717 \u9593\u9055\u3048\u305f\u554f\u984c\uff08'+wrong.length+'\u554f\uff09</div>';
  for(var i=0;i<wrong.length;i++){
    var wq=wrong[i].q,ws=wrong[i].sel;
    var sent=wq.s.replace('( )','<span style="color:#f0b429;font-weight:700;">'+wq.o[wq.a]+'</span>');
    h+='<div class="ri"><div class="ri-s">'+sent+'</div>';
    h+='<div><span class="ri-w">'+wq.o[ws]+'</span><span class="ri-c">\u2713 '+wq.o[wq.a]+'</span></div>';
    h+='<div class="ri-t">'+wq.tip+'</div></div>';}
  rv.innerHTML=h;}
