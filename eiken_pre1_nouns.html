n one's actions（説明責任）"},{"s":"Research suggests that ( ) of thought within teams leads to more innovative and effective problem-solving outcomes.","a":2,"o":["uniformity","conformity","diversity","similarity"],"t":"研究によると、チーム内の思考の多様性はより革新的で効果的な問題解決につながることが示されている。","e":"<span class='fb-correct'>✓ 正解：diversity</span>diversity は「多様性」。diversity of opinion / cultural diversity / embrace diversity は準1級社会系の最頻出名詞。","tip":"💡 diversity = variety / range（多様性）"},{"s":"A lack of access to quality education remains the greatest ( ) to social mobility for children growing up in poverty.","a":3,"o":["advantage","benefit","solution","obstacle"],"t":"質の高い教育へのアクセス不足は、貧困の中で育つ子供たちの社会的流動性に対する最大の障壁であり続けている。","e":"<span class='fb-correct'>✓ 正解：obstacle</span>obstacle は「障害・妨げ」。major obstacle / overcome an obstacle / obstacle to progress は準1級で超頻出。","tip":"💡 obstacle = barrier / hurdle（障害・妨げ）"},{"s":"The organization's ( ) was seriously damaged after it was revealed that key data in its report had been fabricated.","a":0,"o":["credibility","popularity","efficiency","flexibility"],"t":"報告書の重要なデータが捏造されていたことが明らかになった後、その組織の信頼性は深刻に損なわれた。","e":"<span class='fb-correct'>✓ 正解：credibility</span>credibility は「信頼性・信憑性」。lose credibility / damage credibility / establish credibility は準1級で超頻出。","tip":"💡 credibility = trustworthiness / reliability（信頼性・信憑性）"},{"s":"Auditors discovered a significant ( ) between the company's reported earnings and its actual financial records.","a":1,"o":["similarity","discrepancy","consistency","balance"],"t":"監査人は、その会社の報告された収益と実際の財務記録の間に大きな食い違いを発見した。","e":"<span class='fb-correct'>✓ 正解：discrepancy</span>discrepancy は「食い違い・不一致」。a significant discrepancy / discrepancy between A and B は準1級ビジネス・法律系で頻出。","tip":"💡 discrepancy = difference / inconsistency（食い違い・矛盾）"},{"s":"The hospital recruited specialists from abroad to fill the gaps in ( ) that could not be addressed with domestic staff.","a":2,"o":["shortage","interest","expertise","ambition"],"t":"その病院は国内のスタッフでは対応できない専門知識の空白を埋める ack their original plans and focus on a smaller pilot study instead.","a":3,"o":["support","freedom","flexibility","constraint"],"t":"予算の制約により研究チームは元の計画を縮小し、代わりにより小規模なパイロット研究に集中することを余儀なくされた。","e":"<span class='fb-correct'>✓ 正解：constraint</span>constraint は「制約・束縛」。budget constraint / time constraint / under constraints は準1級ビジネス・研究系で頻出。","tip":"💡 constraint = restriction / limitation（制約・限界）"},{"s":"Several nonprofit organizations joined forces to launch a joint ( ) to address food insecurity in urban areas.","a":0,"o":["initiative","restriction","barrier","setback"],"t":"複数の非営利組織が力を合わせて、都市部の食料不安に対処するための共同取り組みを立ち上げた。","e":"<span class='fb-correct'>✓ 正解：initiative</span>initiative は「取り組み・主導権」。launch an initiative / take the initiative / policy initiative は準1級政治・ビジネス系で超頻出。","tip":"💡 initiative = new plan or action（取り組み・新しい施策）"},{"s":"The company launched a marketing campaign to change the public's ( ) of its products as being overpriced.","a":1,"o":["reality","perception","quality","demand"],"t":"その会社は自社製品が高すぎるという一般市民の認識を変えるためにマーケティングキャンペーンを開始した。","e":"<span class='fb-correct'>✓ 正解：perception</span>perception は「認識・印象」。public perception / change perception / perception of〜 は準1級で超頻出。","tip":"💡 perception = how something is seen or understood（認識・印象）"},{"s":"The prime minister reaffirmed the country's ( ) to reducing carbon emissions by 50 percent before 2035.","a":2,"o":["resistance","reluctance","commitment","opposition"],"t":"首相は2035年までに炭素排出量を50%削減するという国のコミットメントを改めて表明した。","e":"<span class='fb-correct'>✓ 正解：commitment</span>commitment は「約束・コミットメント・取り組み」。strong commitment / commitment to〜 / honor one's commitment は準1級で超頻出。","tip":"💡 commitment = dedication / pledge（約束・取り組み）"},{"s":"Educational programs aim to challenge harmful ( ) about gender roles that can limit career choices for young people.","a":3,"o":["achievement","diversity","tradition","stereotype"],"t":"教育プログラムは、若者のキャリア選択を制限しうる性役割に関する有害な固定観念に挑戦することを目的としている。","e":"<span class='fb-correct'>✓ 正解：stereotype</span>stereotype は「ステレオタイプ・固定観念」。gender stereotype / challenge stereotypes / reinforce stereotypes は準1級社会系で頻出。","tip":"💡 stereotype = fixed and oversimplified image（固定観念・偏った見方）"},{"s":"Despite repeated failures, the scientist continued her ( ) to find an effective treatment for the rare neurological disease.","a":0,"o":["endeavor","hesitation","reluctance","withdrawal"],"t":"繰り返しの失敗にもかかわらず、その科学者はまれな神経疾患の効果的な治療法を見つけるための努力を続けた。","e":"<span class='fb-correct'>✓ 正解：endeavor</span>endeavor は「努力・取り組み」。scientific endeavor / human endeavor / despite one's endeavors は準1級で頻出。effort より書き言葉的で継続的な努力を含意する。","tip":"💡 endeavor = sustained effort / attempt（継続的な努力・試み）"},{"s":"Reading literature from different cultures gives students a broader ( ) on global issues and human experiences.","a":1,"o":["limitation","perspective","constraint","barrier"],"t":"異なる文化の文学を読むことで、生徒たちはグローバルな問題や人間の経験についてより広い視点を得ることができる。","e":"<span class='fb-correct'>✓ 正解：perspective</span>perspective は「視点・見方」。broader perspective / global perspective / from a different perspective は準1級で超頻出。","tip":"💡 perspective = point of view / viewpoint（視点・見方）"},{"s":"One major ( ) of remote working is the difficulty of maintaining team cohesion and a strong company culture.","a":2,"o":["advantage","benefit","drawback","outcome"],"t":"リモートワークの主な欠点の一つは、チームの結束と強い企業文化を維持することの難しさである。","e":"<span class='fb-correct'>✓ 正解：drawback</span>drawback は「欠点・デメリット」。major drawback / one drawback is / drawback of〜 は準1級で頻出。disadvantage / downside とほぼ同義。","tip":"💡 drawback = disadvantage / downside（欠点・デメリット）"},{"s":"Early medical ( ) is crucial in cases of stroke, as treatment within the first few hours can prevent permanent damage.","a":3,"o":["delay","observation","neglect","intervention"],"t":"脳卒中の場合、最初の数時間以内の治療が永続的な損傷を防ぐことができるため、早期の医療介入が非常に重要である。","e":"<span class='fb-correct'>✓ 正解：intervention</span>intervention は「介入・治療」。early intervention / government intervention / surgical intervention は準1級医療・政治系で超頻出。","tip":"💡 intervention = action taken to improve a situation（介入・治療・仲裁）"},{"s":"The ability to recover from ( ) and continue pursuing one's goals is often described as resilience or grit.","a":0,"o":["adversity","success","comfort","opportunity"],"t":"逆境から回復して目標を追い続ける能力は、しばしばレジリエンスや粘り強さと表現される。","e":"<span class='fb-correct'>✓ 正解：adversity</span>adversity は「逆境・苦難」。face adversity / overcome adversity / in the face of adversity は準1級で頻出。","tip":"💡 adversity = hardship / difficulty（逆境・苦難）"},{"s":"The announcement sparked considerable ( ) among scientists who questioned the validity of the research methods used.","a":1,"o":["consensus","controversy","agreement","support"],"t":"その発表は、使用された研究方法の有効性に疑問を持つ科学者たちの間でかなりの論争を引き起こした。","e":"<span class='fb-correct'>✓ 正解：controversy</span>controversy は「論争・物議」。spark controversy / cause controversy / amid controversy は準1級で超頻出。","tip":"💡 controversy = public debate and disagreement（論争・物議）"},{"s":"Access to quality healthcare should be a universal right, not a ( ) reserved only for those who can afford it.","a":2,"o":["burden","duty","privilege","obligation"],"t":"質の高い医療へのアクセスは普遍的な権利であるべきで、それを購入できる人だけのための特権であってはならない。","e":"<span class='fb-correct'>✓ 正解：privilege</span>privilege は「特権・恵まれた立場」。social privilege / privilege of〜 / privileged（形容詞）は準1級社会・政治系で頻出。","tip":"💡 privilege = special advantage or right（特権・特別な恩恵）"}];

var cur=0,score=0,wrong=[],done=false;

function pick(sel){
  if(done)return;done=true;var q=Q[cur];

  var fb=document.getElementById('fb');
