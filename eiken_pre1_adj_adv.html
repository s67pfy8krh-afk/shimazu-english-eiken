<script>
var Q=[{"s":"Prolonged exposure to high levels of stress can be ( ) to both physical and mental health in the long run.","a":0,"o":["detrimental","beneficial","irrelevant","essential"],"t":"高いレベルのストレスに長時間さらされることは、長期的には身体的・精神的健康の両方に有害である可能性がある。","e":"<span class='fb-correct'>✓ 正解：detrimental</span>detrimental は「有害な・悪影響を与える」。detrimental to health / detrimental effects / detrimental impact は準1級頻出コロケーション。harmful より書き言葉的・公式なニュアンス。","tip":"💡 detrimental to = harmful to（有害な）"},{"s":"Given the rapid pace of technological change, some degree of job displacement seems ( ) in the coming decades.","a":1,"o":["optional","inevitable","unlikely","avoidable"],"t":"技術変化のペースの速さを考えると、今後数十年で雇用喪失がある程度避けられないように思われる。","e":"<span class='fb-correct'>✓ 正解：inevitable</span>inevitable は「避けられない・必然的な」。inevitable consequence / inevitable change / seem inevitable は準1級の最重要形容詞の一つ。","tip":"💡 inevitable = unavoidable（避けられない・必然の）"},{"s":"Many scientists remain ( ) about the long-term effectiveness of carbon capture technology as a climate solution.","a":3,"o":["confident","optimistic","convinced","skeptical"],"t":"多くの科学者は、気候問題の解決策としての炭素回収技術の長期的な有効性について懐疑的なままである。","e":"<span class='fb-correct'>✓ 正解：skeptical</span>skeptical は「懐疑的な」。be skeptical about / remain skeptical of〜 は科学・政策系テーマで頻出。skepticism（名詞）も合わせて覚えよう。","tip":"💡 skeptical about = doubtful about（懐疑的な）"},{"s":"Misinformation about health topics has become increasingly ( ) on social media platforms in recent years.","a":2,"o":["scarce","rare","prevalent","absent"],"t":"健康に関する誤った情報が、近年ソーシャルメディアプラットフォームでますます広まっている。","e":"<span class='fb-correct'>✓ 正解：prevalent</span>prevalent は「広く普及している・蔓延している」。prevalent disease / prevalent belief / increasingly prevalent は社会・医療系で頻出。widespread とほぼ同義。","tip":"💡 prevalent = widespread（広く蔓延している）"},{"s":"The company invested a ( ) amount of resources into research and development to stay ahead of its competitors.","a":0,"o":["substantial","minimal","trivial","slight"],"t":"その会社は競合他社の先を行くために、研究開発にかなりの量の資源を投資した。","e":"<span class='fb-correct'>✓ 正解：substantial</span>substantial は「相当な・かなりの」。a substantial amount / substantial evidence / substantial progress は準1級ビジネス・研究系の最頻出形容詞。","tip":"💡 substantial = considerable / significant（相当な）"},{"s":"The wording of the new law was so ( ) that lawyers and judges interpreted it in very different ways.","a":1,"o":["precise","ambiguous","explicit","straightforward"],"t":"その新しい法律の文言があまりにも曖昧であったため、弁護士や判事が全く異なる解釈をした。","e":"<span class='fb-correct'>✓ 正解：ambiguous</span>ambiguous は「曖昧な・多義的な」。ambiguous statement / ambiguous language は準1級語彙で頻出。vague と似るが、複数の意味に解釈できる含意がある。","tip":"💡 ambiguous = unclear / having multiple interpretations（曖昧な）"},{"s":"Elderly people and young children are particularly ( ) to severe complications from respiratory illnesses.","a":3,"o":["resistant","immune","opposed","vulnerable"],"t":"高齢者と幼い子供は、呼吸器疾患による重篤な合併症に特にさらされやすい。","e":"<span class='fb-correct'>✓ 正解：vulnerable</span>vulnerable は「脆弱な・傷つきやすい」。vulnerable to disease / vulnerable population / particularly vulnerable は医療・社会系で超頻出。","tip":"💡 vulnerable to = susceptible to（〜に対して弱い・脆弱な）"},{"s":"The politician's proposal to restructure the pension system attracted ( ) reactions from different sectors of society.","a":2,"o":["universal","unanimous","controversial","straightforward"],"t":"年金制度の再構築に関するその政治家の提案は、社会のさまざまな分野から物議をかもす反応を呼び起こした。","e":"<span class='fb-correct'>✓ 正解：controversial</span>controversial は「物議をかもす・論争的な」。controversial topic / controversial decision / prove controversial は準1級で最頻出形容詞。","tip":"💡 controversial = causing strong disagreement（物議をかもす）"},{"s":"The committee failed to present a ( ) strategy for addressing the housing crisis despite months of discussion.","a":0,"o":["coherent","vague","inconsistent","confusing"],"t":"委員会は数ヶ月の議論にもかかわらず、住宅危機に対処するための一貫した戦略を提示できなかった。","e":"<span class='fb-correct'>✓ 正解：coherent</span>coherent は「一貫性のある・筋の通った」。a coherent argument / a coherent plan / coherent policy は準1級の重要語彙。","tip":"💡 coherent = logical and consistent（一貫性のある）"},{"s":"Health experts warn that ( ) consumption of processed foods can significantly increase the risk of chronic disease.","a":1,"o":["moderate","excessive","minimal","balanced"],"t":"健康の専門家たちは、加工食品の過剰摂取が慢性疾患のリスクを大幅に増加させると警告している。","e":"<span class='fb-correct'>✓ 正解：excessive</span>excessive は「過剰な・度を超えた」。excessive consumption / excessive use / excessive stress は準1級医療・社会系で頻出。","tip":"💡 excessive = too much / beyond what is normal（過剰な）"},{"s":"English has become the ( ) language of international business, scientific research, and digital communication.","a":2,"o":["secondary","declining","predominant","minor"],"t":"英語は国際ビジネス、科学研究、デジタルコミュニケーションにおいて支配的な言語となっている。","e":"<span class='fb-correct'>✓ 正解：predominant</span>predominant は「支配的な・最も一般的な」。the predominant language / predominant factor / predominant view は準1級で頻出。dominant とほぼ同義。","tip":"💡 predominant = dominant（支配的な・最も普及している）"},{"s":"Citizens demanded that the government be more ( ) about how public funds were being allocated and spent.","a":3,"o":["secretive","cautious","reluctant","transparent"],"t":"市民は政府が公的資金をどのように配分・支出しているかについて、より透明性を持つよう要求した。","e":"<span class='fb-correct'>✓ 正解：transparent</span>transparent は「透明性のある・オープンな」。transparent process / transparent government / be transparent about は準1級行政・ビジネス系で頻出。transparency（名詞）も重要。","tip":"💡 transparent = open and honest（透明性のある）"},{"s":"There is an ( ) tension between economic development and environmental protection that policymakers must navigate.","a":0,"o":["inherent","external","temporary","artificial"],"t":"政策立案者が対処しなければならない、経済発展と環境保護の間には固有の緊張関係がある。","e":"<span class='fb-correct'>✓ 正解：inherent</span>inherent は「本来備わっている・固有の」。inherent risk / inherent tension / inherent in〜 は準1級で頻出。intrinsic とほぼ同義。","tip":"💡 inherent in = intrinsic to（〜に本来備わっている）"},{"s":"The new diagnostic tool uses a ( ) algorithm to analyze patient data and predict the likelihood of disease.","a":1,"o":["primitive","sophisticated","outdated","simplistic"],"t":"その新しい診断ツールは、患者データを分析し疾患の可能性を予測するために高度なアルゴリズムを使用している。","e":"<span class='fb-correct'>✓ 正解：sophisticated</span>sophisticated は「洗練された・高度な」。sophisticated technology / sophisticated system / highly sophisticated は準1級テクノロジー系で超頻出。","tip":"💡 sophisticated = advanced and complex（洗練された・高度な）"},{"s":"The discovery had a ( ) impact on our understanding of human evolution and early migration patterns.","a":2,"o":["negligible","temporary","profound","minimal"],"t":"その発見は、人類の進化と初期の移住パターンに対する我々の理解に深遠な影響を与えた。","e":"<span class='fb-correct'>✓ 正解：profound</span>profound は「深い・根本的な」。profound impact / profound change / profound influence は準1級で最頻出形容詞の一つ。","tip":"💡 profound impact / profound effect（深遠な影響）は超頻出"},{"s":"The archaeologist was ( ) in her documentation of each artifact, recording every measurement with great precision.","a":3,"o":["careless","hasty","indifferent","meticulous"],"t":"その考古学者は各遺物の記録に細心の注意を払い、すべての計測値を非常に精密に記録した。","e":"<span class='fb-correct'>✓ 正解：meticulous</span>meticulous は「細心の注意を払う・几帳面な」。meticulous attention / meticulous research / be meticulous about は準1級で頻出。","tip":"💡 meticulous = extremely careful and precise（細心の注意を払う）"},{"s":"The lawyer presented a ( ) argument that convinced the jury of her client's innocence beyond reasonable doubt.","a":0,"o":["compelling","weak","vague","confusing"],"t":"その弁護士は、合理的な疑いを超えて陪審員に依頼人の無実を確信させる説得力ある主張を提示した。","e":"<span class='fb-correct'>✓ 正解：compelling</span>compelling は「説得力のある・惹きつける」。compelling argument / compelling evidence / compelling reason は準1級で頻出。","tip":"💡 compelling = persuasive / convincing（説得力のある）"},{"s":"There are ( ) concerns about the privacy implications of collecting such detailed personal data from app users.","a":1,"o":["unfounded","legitimate","exaggerated","unrealistic"],"t":"アプリユーザーからこれほど詳細な個人データを収集することのプライバシーへの影響について、正当な懸念がある。","e":"<span class='fb-correct'>✓ 正解：legitimate</span>legitimate は「正当な・合法な」。legitimate concern / legitimate reason / legitimate authority は準1級で頻出。valid と同義だが、より「認められた・法的に有効な」ニュアンスがある。","tip":"💡 legitimate = valid / lawful（正当な・合法な）"},{"s":"The contract contained ( ) instructions about the responsibilities of both parties to avoid any future misunderstanding.","a":2,"o":["vague","implicit","explicit","ambiguous"],"t":"その契約書には、将来の誤解を避けるために両当事者の責任について明示的な指示が含まれていた。","e":"<span class='fb-correct'>✓ 正解：explicit</span>explicit は「明示的な・はっきりした」。explicit instructions / explicit agreement / make explicit は準1級で頻出。implicit（暗黙の）との対比で覚えよう。","tip":"💡 explicit ↔ implicit（明示的 ↔ 暗黙の）"},{"s":"Despite years of investment, the improvement in student test scores has been ( ) and difficult to measure accurately.","a":3,"o":["dramatic","significant","substantial","marginal"],"t":"長年の投資にもかかわらず、生徒のテスト成績の向上はわずかであり、正確に測定することが難しい。","e":"<span class='fb-correct'>✓ 正解：marginal</span>marginal は「わずかな・ごくわずかの」。marginal improvement / marginal difference / marginal benefit は準1級で頻出。minimal / negligible と近い意味。","tip":"💡 marginal = slight / minimal（ごくわずかの）"},{"s":"Investigators concluded that the fire was ( ), as evidence of accelerants was found at several locations in the building.","a":0,"o":["deliberate","accidental","unexpected","unavoidable"],"t":"建物の複数の場所で着火剤の証拠が発見されたことから、捜査員たちは火事が故意によるものだと結論付けた。","e":"<span class='fb-correct'>✓ 正解：deliberate</span>deliberate は「意図的な・故意の」。deliberate act / deliberate attempt / deliberate decision は準1級で頻出。intentional とほぼ同義。","tip":"💡 deliberate = intentional（意図的な・故意の）"},{"s":"The suspect offered a ( ) explanation for his whereabouts on the night in question, which police could not immediately disprove.","a":1,"o":["suspicious","plausible","unreliable","contradictory"],"t":"容疑者は問題の夜の所在地についてもっともらしい説明をしたが、警察はすぐには反証できなかった。","e":"<span class='fb-correct'>✓ 正解：plausible</span>plausible は「もっともらしい・十分ありうる」。a plausible explanation / plausible theory / seem plausible は準1級で頻出。","tip":"💡 plausible = seemingly reasonable（もっともらしい）"},{"s":"People with weakened immune systems are more ( ) to infections and may require additional preventive measures.","a":2,"o":["resistant","immune","susceptible","opposed"],"t":"免疫システムが弱い人々は感染症にかかりやすく、追加の予防措置が必要になる場合がある。","e":"<span class='fb-correct'>✓ 正解：susceptible</span>susceptible は「感染しやすい・影響を受けやすい」。susceptible to disease / susceptible to infection / particularly susceptible は医療・健康系で頻出。","tip":"💡 susceptible to = vulnerable to（〜に弱い・かかりやすい）"},{"s":"The report provides a ( ) overview of current research on renewable energy and its potential applications worldwide.","a":3,"o":["brief","partial","superficial","comprehensive"],"t":"その報告書は、再生可能エネルギーに関する現在の研究とその世界的な潜在的応用についての包括的な概要を提供している。","e":"<span class='fb-correct'>✓ 正解：comprehensive</span>comprehensive は「包括的な・網羅的な」。a comprehensive study / comprehensive guidelines / comprehensive approach は準1級で超頻出。","tip":"💡 comprehensive = thorough and complete（包括的な）"},{"s":"Several economists expressed ( ) views about the government's optimistic projections for economic recovery next year.","a":0,"o":["dubious","confident","enthusiastic","supportive"],"t":"数人の経済学者が来年の経済回復に関する政府の楽観的な予測について疑わしいという見解を示した。","e":"<span class='fb-correct'>✓ 正解：dubious</span>dubious は「疑わしい・信頼できない」。dubious claim / dubious practice / remain dubious は準1級で頻出。skeptical より「怪しい・疑わしい」という否定的なニュアンスが強い。","tip":"💡 dubious = doubtful / questionable（疑わしい）"},{"s":"The speed at which the vaccine was developed was ( ) and marked a significant turning point in medical research.","a":1,"o":["expected","unprecedented","predictable","ordinary"],"t":"ワクチンが開発された速度は前例のないものであり、医学研究における重要な転換点となった。","e":"<span class='fb-correct'>✓ 正解：unprecedented</span>unprecedented は「前例のない・史上初の」。unprecedented speed / unprecedented scale / an unprecedented event は準1級で超頻出。","tip":"💡 unprecedented = never seen before（前例のない・史上初の）"},{"s":"Many traditional manufacturing skills have become ( ) as automated machines have taken over most production processes.","a":2,"o":["valuable","essential","obsolete","relevant"],"t":"自動機械がほとんどの生産プロセスを引き継いだことで、多くの伝統的な製造スキルは時代遅れになっている。","e":"<span class='fb-correct'>✓ 正解：obsolete</span>obsolete は「時代遅れの・廃れた」。become obsolete / obsolete technology / render obsolete（〜を時代遅れにする）は準1級テクノロジー・社会系で頻出。","tip":"💡 obsolete = outdated / no longer useful（廃れた・時代遅れ）"},{"s":"A good journalist must remain ( ) when reporting on controversial topics and present all sides of an argument fairly.","a":3,"o":["biased","subjective","opinionated","impartial"],"t":"優れたジャーナリストは、論争的なトピックを報道する際に公平であり続け、議論のすべての側面を公正に提示しなければならない。","e":"<span class='fb-correct'>✓ 正解：impartial</span>impartial は「公平な・中立な」。impartial judge / impartial reporting / remain impartial は準1級社会・法律系で頻出。neutral / unbiased とほぼ同義。","tip":"💡 impartial = unbiased / neutral（公平な・偏りのない）"},{"s":"The instructions for setting up the new software were surprisingly ( ), and most users completed the process in minutes.","a":0,"o":["straightforward","complicated","confusing","technical"],"t":"新しいソフトウェアの設定手順は驚くほど単純明快で、ほとんどのユーザーは数分でプロセスを完了した。","e":"<span class='fb-correct'>✓ 正解：straightforward</span>straightforward は「わかりやすい・単純明快な」。straightforward process / straightforward answer / fairly straightforward は準1級で頻出。","tip":"💡 straightforward = simple and easy to understand（単純明快な）"},{"s":"Despite the overwhelming evidence, the committee was ( ) to admit that its earlier decision had been a serious mistake.","a":1,"o":["eager","reluctant","willing","prepared"],"t":"圧倒的な証拠があったにもかかわらず、委員会は以前の決定が深刻な誤りであったことを認めることを嫌がった。","e":"<span class='fb-correct'>✓ 正解：reluctant</span>reluctant は「気が進まない・しぶしぶの」。reluctant to do / remain reluctant / reluctant agreement は準1級で最頻出形容詞の一つ。","tip":"💡 reluctant to do ↔ eager to do（したがらない ↔ したがる）"}];
var cS='英検準1級の語彙は十分なレベルです。1級レベルの語彙強化に進みましょう。',cA='英検準1級合格圏内のレベルです。間違えた単語を例文ごと復習して完成度を高めましょう。',cB='もう少しで合格レベルです。高度な語彙を文脈の中で確認しながら覚え直しましょう。',cC='語彙強化が必要です。パス単準1級などで頻出語を例文ごと覚えることを推奨します。';
var cur=0,score=0,wrong=[],done=false;
function go(){cur=0;score=0;wrong=[];done=false;document.getElementById('s0').className='screen';document.getElementById('s1').className='screen active';render();}
function render(){
  done=false;var q=Q[cur],t=Q.length;
  document.getElementById('pc').textContent=(cur+1)+' / '+t;
  document.getElementById('sv').textContent='\u6b63\u89e3: '+score;
  document.getElementById('pf').style.width=((cur/t)*100)+'%';
  document.getElementById('qt').textContent='QUESTION '+(cur+1);
  document.getElementById('qs').innerHTML=q.s.replace('( )','<span class="bk">(\u3000\u3000\u3000)</span>');
  document.getElementById('qt2').textContent=q.t;
  var g=document.getElementById('og');g.innerHTML='';
  ['A','B','C','D'].forEach(function(l,i){
    var b=document.createElement('button');b.className='ob';
    b.innerHTML='<span class="ol">'+l+'</span> '+q.o[i];
    b.onclick=(function(idx){return function(){pick(idx);};})(i);
    g.appendChild(b);
  });
  var fb=document.getElementById('fb');fb.className='fb';fb.innerHTML='';
  var nb=document.getElementById('bn');nb.className='bn';
  nb.textContent=cur+1===t?'\u7d50\u679c\u3092\u898b\u308b':'\u6b21\u306e\u554f\u984c \u2192';
}
function pick(sel){
  if(done)return;done=true;var q=Q[cur];
  var bs=document.querySelectorAll('.ob');
  for(var i=0;i<bs.length;i++){bs[i].disabled=true;
    if(i===q.a)bs[i].classList.add('co');
    else if(i===sel&&sel!==q.a)bs[i].classList.add('wr');}
  var fb=document.getElementById('fb');
  if(sel===q.a){score++;document.getElementById('sv').textContent='\u6b63\u89e3: '+score;
    fb.innerHTML=q.e+'<span style="color:#94a3b8;font-size:12px;margin-top:6px;display:block;">'+q.tip+'</span>';}
  else{wrong.push({q:q,sel:sel});
    fb.innerHTML='<span style="color:#ef4444;font-weight:700;margin-bottom:6px;display:block;">\u2717 \u3042\u306a\u305f\u306e\u7b54\u3048\uff1a'+q.o[sel]+'</span>'+q.e+'<span style="color:#94a3b8;font-size:12px;margin-top:6px;display:block;">'+q.tip+'</span>';}
  fb.className='fb on';document.getElementById('bn').className='bn on';
}
function nxt(){cur++;if(cur>=Q.length)showResult();else render();}
function showResult(){
  document.getElementById('s1').className='screen';
  document.getElementById('s2').className='screen active';
  var t=Q.length,p=Math.round((score/t)*100),rank,rc,rb,com;
  if(p>=90){rank='S';rc='#f0b429';rb='rgba(240,180,41,0.2)';com=cS;}
  else if(p>=77){rank='A';rc='#22c55e';rb='rgba(34,197,94,0.2)';com=cA;}
  else if(p>=60){rank='B';rc='#3b82f6';rb='rgba(59,130,246,0.2)';com=cB;}
  else{rank='C';rc='#ef4444';rb='rgba(239,68,68,0.2)';com=cC;}
  document.getElementById('rk').textContent=rank;
  document.getElementById('rk').style.color=rc;
  document.getElementById('rs').textContent=t+'\u554f\u4e2d '+score+'\u554f\u6b63\u89e3\uff08\u6b63\u7b54\u7387 '+p+'%\uff09';
  var rl=document.getElementById('rl');
  rl.textContent={S:'\u512a\u79c0',A:'\u5408\u683c\u5708\u5185',B:'\u3082\u3046\u5c11\u3057',C:'\u8981\u5f37\u5316'}[rank];
  rl.style.cssText='background:'+rb+';color:'+rc+';border:1px solid '+rc;
  document.getElementById('cm').textContent=com;
  var mf=document.getElementById('mf');mf.style.background=rc;
  setTimeout(function(){mf.style.width=p+'%';},100);
  var rv=document.getElementById('rv');
  if(!wrong.length){rv.innerHTML='<div style="text-align:center;color:#22c55e;font-weight:700;padding:20px 0;">\uD83C\uDF89 \u5168\u554f\u6b63\u89e3\uff01\u7d20\u6674\u3089\u3057\u3044\uff01</div>';return;}
  var h='<div class="rv-title">\u2717 \u9593\u9055\u3048\u305f\u554f\u984c\uff08'+wrong.length+'\u554f\uff09</div>';
  for(var i=0;i<wrong.length;i++){
    var wq=wrong[i].q,ws=wrong[i].sel;
    var sent=wq.s.replace('( )','<span style="color:#f0b429;font-weight:700;">'+wq.o[wq.a]+'</span>');
    h+='<div class="ri"><div class="ri-s">'+sent+'</div><div><span class="ri-w">'+wq.o[ws]+'</span><span class="ri-c">\u2713 '+wq.o[wq.a]+'</span></div><div class="ri-t">'+wq.tip+'</div></div>';}
  rv.innerHTML=h;
}
