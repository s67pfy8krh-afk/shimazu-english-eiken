<script>
var Q=[{"s":"A team of specialists was called in to ( ) the patient's rare condition after routine tests repeatedly failed to identify the underlying cause.","a":0,"o":["diagnose","prescribe","hospitalize","examine"],"t":"通常の検査で根本原因が繰り返し特定できなかったため、患者のまれな疾患を診断するために専門家チームが呼ばれた。","e":"<span class='fb-correct'>✓ 正解：diagnose</span>diagnose は「〜を診断する」。diagnose a condition / diagnose cancer / be diagnosed with〜 は医療系で超頻出。diagnosis（名詞）も合わせて覚えよう。","tip":"💡 diagnose = identify an illness or condition（病気・状態を診断する）"},{"s":"Doctors are strongly encouraged not to ( ) antibiotics unnecessarily, as overuse contributes to the growing problem of drug resistance.","a":1,"o":["diagnose","prescribe","administer","monitor"],"t":"抗生物質の過剰使用が薬剤耐性という深刻な問題に寄与するため、医師は不必要に抗生物質を処方しないよう強く奨励されている。","e":"<span class='fb-correct'>✓ 正解：prescribe</span>prescribe は「〜を処方する」。prescribe medication / prescribe antibiotics / doctor prescribed は医療系で超頻出。prescription（名詞）も重要語。","tip":"💡 prescribe = authorize the use of a medicine（薬を処方する）"},{"s":"Following the surgery, the patient underwent an intensive program to ( ) her damaged knee and regain full mobility over several months.","a":2,"o":["examine","monitor","rehabilitate","hospitalize"],"t":"手術後、患者は数ヶ月かけて損傷した膝をリハビリし完全な動きを回復するための集中的なプログラムを受けた。","e":"<span class='fb-correct'>✓ 正解：rehabilitate</span>rehabilitate は「〜をリハビリする・回復させる」。rehabilitate patients / rehabilitate injured athletes / rehabilitation program は医療系で頻出。","tip":"💡 rehabilitate = restore to health or normal function（リハビリする・回復させる）"},{"s":"Patients recovering from heart surgery are required to ( ) their blood pressure daily and report any sudden changes to their physician.","a":3,"o":["ignore","prescribe","diagnose","monitor"],"t":"心臓手術後に回復中の患者は毎日血圧をモニタリングし、突然の変化を医師に報告することが求められる。","e":"<span class='fb-correct'>✓ 正解：monitor</span>monitor は「〜を監視する・モニタリングする」。monitor patients / monitor vital signs / monitor progress は医療・科学系で超頻出。","tip":"💡 monitor = regularly check or observe（定期的に監視・確認する）"},{"s":"Nurses are trained to ( ) medications accurately and to observe patients closely for any adverse reactions following treatment.","a":0,"o":["administer","withhold","prescribe","diagnose"],"t":"看護師は薬を正確に投与し、治療後の副作用がないか患者を注意深く観察するよう訓練されている。","e":"<span class='fb-correct'>✓ 正解：administer</span>administer は「〜を投与する・管理する」。administer medication / administer a vaccine / administer treatment は医療系で頻出。administration（名詞）も重要語。","tip":"💡 administer = give or apply a treatment（薬・治療を投与する）"},{"s":"Health officials urged the entire population to ( ) against the flu before the winter season to help prevent a widespread outbreak.","a":1,"o":["diagnose","vaccinate","hospitalize","treat"],"t":"保健当局は冬季を前に大規模な流行を防ぐために全市民がインフルエンザのワクチン接種を受けるよう求めた。","e":"<span class='fb-correct'>✓ 正解：vaccinate</span>vaccinate は「〜にワクチン接種する」。vaccinate against disease / vaccinate children / be vaccinated は医療・公衆衛生系で超頻出。vaccine（名詞）とセットで覚えよう。","tip":"💡 vaccinate = give a vaccine to prevent disease（ワクチン接種する）"},{"s":"The physician took time to carefully ( ) the patient and review all available test results before making a final diagnosis.","a":2,"o":["prescribe","monitor","examine","administer"],"t":"医師は最終的な診断を下す前に患者を注意深く診察し、利用可能なすべての検査結果を見直すために時間をかけた。","e":"<span class='fb-correct'>✓ 正解：examine</span>examine は「〜を診察する・検査する」。examine a patient / examine evidence / medical examination は医療・法律系で頻出。examination（名詞）も重要語。","tip":"💡 examine = inspect carefully（診察する・詳しく調べる）"},{"s":"Respiratory viruses can be ( ) from person to person through droplets released when an infected individual coughs or sneezes.","a":3,"o":["contain","prevent","cure","transmit"],"t":"呼吸器ウイルスは感染者が咳やくしゃみをしたときに放出される飛沫を通じて人から人へと感染する可能性がある。","e":"<span class='fb-correct'>✓ 正解：transmit</span>transmit は「〜を伝染させる・伝播する」。transmit a virus / transmit disease / be transmitted through〜 は医療・科学系で頻出。transmission（名詞）も重要語。","tip":"💡 transmit = pass on / spread（伝染させる・伝播する）"},{"s":"Medical teams were deployed to ( ) residents in remote villages where access to regular healthcare facilities was severely limited.","a":0,"o":["inoculate","examine","hospitalize","prescribe"],"t":"定期的な医療施設へのアクセスが著しく限られている辺鄙な村の住民に予防接種するために医療チームが派遣された。","e":"<span class='fb-correct'>✓ 正解：inoculate</span>inoculate は「〜に予防接種する・接種する」。inoculate against disease / inoculate children / be inoculated は医療・公衆衛生系で頻出。vaccinate とほぼ同義だが、より広い「免疫付与」を指す学術的な表現。","tip":"💡 inoculate = introduce a vaccine into the body（予防接種する・接種する）"},{"s":"( ) conditions such as diabetes and high blood pressure require ongoing management and regular monitoring throughout a patient's life.","a":1,"o":["Acute","Chronic","Terminal","Infectious"],"t":"糖尿病や高血圧などの慢性疾患は患者の生涯を通じて継続的な管理と定期的なモニタリングを必要とする。","e":"<span class='fb-correct'>✓ 正解：Chronic</span>chronic は「慢性の・長期的な」。chronic disease / chronic pain / chronic condition は医療系で超頻出。acute（急性の）との対比で覚えよう。","tip":"💡 chronic ↔ acute（慢性の ↔ 急性の）"},{"s":"Even small doses of the substance can be ( ) if ingested, making proper storage, labeling, and handling critically important.","a":2,"o":["harmless","mild","lethal","beneficial"],"t":"その物質は少量でも摂取すると致死的になる可能性があるため、適切な保管・表示・取り扱いが非常に重要だ。","e":"<span class='fb-correct'>✓ 正解：lethal</span>lethal は「致死的な・命に関わる」。lethal dose / lethal injection / potentially lethal は医療・法律系で頻出。fatal とほぼ同義だが、lethal は「死を引き起こす能力がある」という意味を強調する。","tip":"💡 lethal = capable of causing death（致死的な）"},{"s":"The health authorities advised people to stay home if they suspected they had the ( ) illness to avoid spreading it to others.","a":3,"o":["genetic","chronic","terminal","contagious"],"t":"保健当局は感染性の疾患にかかっていると疑われる場合はそれ以上広めないために自宅にいるよう人々に助言した。","e":"<span class='fb-correct'>✓ 正解：contagious</span>contagious は「感染性の・人から人へうつる」。contagious disease / highly contagious / contagious illness は医療・公衆衛生系で頻出。infectious と似るが、contagious は「接触によって感染する」ことを強調する。","tip":"💡 contagious = easily spread from person to person（感染性の・うつりやすい）"},{"s":"After receiving a ( ) diagnosis, the patient chose to spend her remaining time at home surrounded by family rather than undergoing further treatment.","a":0,"o":["terminal","contagious","preventable","chronic"],"t":"末期の診断を受けた後、その患者はさらに治療を受けるのではなく家族に囲まれて自宅で残りの時間を過ごすことを選んだ。","e":"<span class='fb-correct'>✓ 正解：terminal</span>terminal は「末期の・致命的な」。terminal illness / terminal cancer / terminal patient は医療系で頻出。「治癒の見込みがなく、死につながる」という意味で使われる。","tip":"💡 terminal = fatal, with no prospect of recovery（末期の・回復の見込みがない）"},{"s":"Researchers have identified a ( ) mutation that significantly increases an individual's risk of developing certain types of cancer later in life.","a":1,"o":["environmental","genetic","infectious","preventable"],"t":"研究者たちは特定の種類のがんを生涯で発症するリスクを大幅に高める遺伝子変異を特定した。","e":"<span class='fb-correct'>✓ 正解：genetic</span>genetic は「遺伝子の・遺伝的な」。genetic mutation / genetic disorder / genetic predisposition は医療・科学系で超頻出。gene（遺伝子）→ genetic（形容詞）。","tip":"💡 genetic = relating to genes and heredity（遺伝子の・遺伝的な）"},{"s":"Health officials are closely monitoring the spread of an ( ) disease that has already affected thousands of people in three neighboring countries.","a":2,"o":["hereditary","psychological","infectious","chronic"],"t":"保健当局は既に3つの隣国で何千人もの人々に影響を与えている感染症の拡大を注意深く監視している。","e":"<span class='fb-correct'>✓ 正解：infectious</span>infectious は「感染性の・伝染性の」。infectious disease / infectious agent / highly infectious は医療・公衆衛生系で超頻出。contagious と似るが、infectious は「病原体による感染」を広く指す学術的な語。","tip":"💡 infectious = caused by microorganisms and able to spread（感染性の）"},{"s":"Individuals who maintain healthy lifestyles tend to have more ( ) immune systems and recover from illness more quickly than others.","a":3,"o":["fragile","vulnerable","compromised","resilient"],"t":"健康的な生活習慣を維持している人は、より回復力の高い免疫システムを持ち、他の人より素早く病気から回復する傾向がある。","e":"<span class='fb-correct'>✓ 正解：resilient</span>resilient は「回復力のある・抵抗力のある」。resilient immune system / resilient communities / be resilient は医療・社会系で頻出。resilience（名詞）とセットで覚えよう。","tip":"💡 resilient = able to recover quickly from difficulty（回復力のある）"},{"s":"The report concluded that a large proportion of deaths from heart disease are ( ) through early lifestyle changes and regular medical screening.","a":0,"o":["preventable","inevitable","untreatable","terminal"],"t":"その報告書は心臓病による死亡の大部分が早期の生活習慣改善と定期的な医療スクリーニングによって予防可能だと結論付けた。","e":"<span class='fb-correct'>✓ 正解：preventable</span>preventable は「予防可能な」。preventable disease / largely preventable / preventable deaths は医療・公衆衛生系で頻出。prevent（予防する）＋ able（できる）。","tip":"💡 preventable = capable of being avoided or stopped（予防可能な）"},{"s":"Regular physical exercise has been shown to have significant benefits for ( ) function, including memory, concentration, and decision-making.","a":1,"o":["physical","cognitive","emotional","respiratory"],"t":"定期的な運動は記憶・集中力・意思決定を含む認知機能に大きなメリットがあることが示されている。","e":"<span class='fb-correct'>✓ 正解：cognitive</span>cognitive は「認知の・認識の」。cognitive function / cognitive decline / cognitive impairment は医療・心理学系で超頻出。","tip":"💡 cognitive = relating to mental processes such as thinking and memory（認知の）"},{"s":"The patient was rushed to the emergency room suffering from ( ) chest pain, which doctors suspected could indicate a serious cardiac event.","a":2,"o":["chronic","persistent","acute","gradual"],"t":"その患者は深刻な心臓疾患を示している可能性があると医師が疑った急性の胸痛で救急外来に急いで運ばれた。","e":"<span class='fb-correct'>✓ 正解：acute</span>acute は「急性の・激しい」。acute pain / acute condition / acute illness は医療系で超頻出。chronic（慢性の）との対比で覚えよう。acute は「突然発症し激しい」ことを示す。","tip":"💡 acute ↔ chronic（急性の ↔ 慢性の）"},{"s":"A growing number of elderly patients with complications from influenza are being ( ) each winter as the virus becomes more widespread.","a":3,"o":["examine","prescribe","vaccinate","hospitalize"],"t":"ウイルスがより広範に広がるにつれ冬ごとにインフルエンザの合併症を抱える高齢患者が入院させられるケースが増えている。","e":"<span class='fb-correct'>✓ 正解：hospitalize</span>hospitalize は「〜を入院させる」。be hospitalized / hospitalize patients / require hospitalization は医療系で頻出。hospitalization（名詞）も重要語。","tip":"💡 hospitalize = admit to hospital for treatment（入院させる）"},{"s":"The ( ) exposed critical weaknesses in public health systems worldwide, prompting many governments to invest urgently in emergency preparedness.","a":0,"o":["pandemic","epidemic","outbreak","infection"],"t":"パンデミックは世界中の公衆衛生システムの重大な弱点を露わにし、多くの政府に緊急の備えへの投資を促した。","e":"<span class='fb-correct'>✓ 正解：pandemic</span>pandemic は「世界的流行病・パンデミック」。global pandemic / declare a pandemic / pandemic response は医療・社会系で超頻出。epidemic（特定地域の流行）との区別を覚えよう。","tip":"💡 pandemic = worldwide spread of disease（世界的な感染症の流行）"},{"s":"Public health officials declared an ( ) after more than 500 new cases of the disease were reported within a single week in the region.","a":1,"o":["pandemic","epidemic","outbreak","immunity"],"t":"1週間で500件以上の新規感染者が報告されたことを受け保健当局はその地域での感染症の流行を宣言した。","e":"<span class='fb-correct'>✓ 正解：epidemic</span>epidemic は「（特定地域の）流行病・エピデミック」。declare an epidemic / epidemic levels / an epidemic of obesity は医療・社会系で頻出。pandemic（世界規模）との比較で理解しよう。","tip":"💡 epidemic = rapid spread of disease in a specific area（特定地域での感染症の流行）"},{"s":"Herd ( ) is achieved when enough of the population becomes resistant to a disease, slowing or stopping its spread through the community.","a":2,"o":["sensitivity","vulnerability","immunity","resistance"],"t":"十分な数の人口が疾患に対して抵抗性を持つようになり、コミュニティ内での感染拡大を遅らせるか止めると集団免疫が達成される。","e":"<span class='fb-correct'>✓ 正解：immunity</span>immunity は「免疫・免疫性」。herd immunity / natural immunity / build immunity は医療・公衆衛生系で超頻出。immune（形容詞）→ immunity（名詞）。","tip":"💡 immunity = protection against disease（病気に対する免疫）"},{"s":"Many patients recovering from the illness reported persistent ( ) that lasted for several months even after all other symptoms had resolved.","a":3,"o":["immunity","recovery","diagnosis","fatigue"],"t":"その疾患から回復中の多くの患者が他のすべての症状が消えた後も数ヶ月続く持続的な疲労感を報告した。","e":"<span class='fb-correct'>✓ 正解：fatigue</span>fatigue は「疲労・疲弊」。chronic fatigue / persistent fatigue / suffer from fatigue は医療系で頻出。exhaustion（疲弊）より医学的・客観的なニュアンス。","tip":"💡 fatigue = extreme tiredness（疲労・倦怠感）"},{"s":"Improvements in early detection and treatment have significantly reduced ( ) rates for several types of cancer over the past two decades.","a":0,"o":["mortality","morbidity","fertility","immunity"],"t":"早期発見と治療の改善により過去20年間でいくつかのタイプのがんによる死亡率が大幅に低下した。","e":"<span class='fb-correct'>✓ 正解：mortality</span>mortality は「死亡率・致死率」。mortality rate / reduce mortality / infant mortality は医療・人口学系で超頻出。mortal（死ぬべき運命の）→ mortality（死亡率）。","tip":"💡 mortality rate = proportion of deaths in a population（死亡率）"},{"s":"Hospitals increasingly offer psychological ( ) to patients diagnosed with serious illnesses to help them cope with the emotional impact of their condition.","a":1,"o":["surgery","counseling","medication","immunization"],"t":"病院では深刻な疾患と診断された患者が病気の感情的な影響に対処するための心理カウンセリングをますます提供するようになっている。","e":"<span class='fb-correct'>✓ 正解：counseling</span>counseling は「カウンセリング・相談支援」。psychological counseling / mental health counseling / offer counseling は医療・福祉系で頻出。counselor（カウンセラー）も重要語。","tip":"💡 counseling = guidance and support for emotional or psychological issues（カウンセリング）"},{"s":"Patients are advised to complete the full course of ( ) even if they begin to feel better, to prevent the recurrence of infection.","a":2,"o":["diagnosis","treatment","medication","vaccination"],"t":"感染の再発を防ぐため気分が良くなり始めても投薬の全コースを完了するよう患者は勧められている。","e":"<span class='fb-correct'>✓ 正解：medication</span>medication は「薬・薬物療法」。take medication / prescribed medication / adjust medication は医療系で超頻出。medicine（薬）のより正式な表現として使われる。","tip":"💡 medication = a drug or medicine used to treat illness（薬・投薬）"},{"s":"It is important to be aware of the early warning ( ) of stroke, as prompt treatment can significantly reduce the risk of permanent damage.","a":3,"o":["cause","treatment","diagnosis","symptom"],"t":"迅速な治療が永続的なダメージのリスクを大幅に減らすことができるため脳卒中の初期警告症状を認識することが重要だ。","e":"<span class='fb-correct'>✓ 正解：symptom</span>symptom は「症状・兆候」。display symptoms / symptom of disease / warning symptoms は医療系で超頻出。sign と似るが、symptom は「患者が感じる主観的な変化」を指すことが多い。","tip":"💡 symptom = a sign that someone is unwell（症状・病気の兆候）"},{"s":"An ( ) of food poisoning at the catering event was traced back to improperly stored shellfish that had been served at the reception.","a":0,"o":["outbreak","prevention","recovery","containment"],"t":"ケータリングイベントでの食中毒の発生はレセプションで提供された不適切に保存された貝類が原因であることが判明した。","e":"<span class='fb-correct'>✓ 正解：outbreak</span>outbreak は「（疾病などの）発生・発生」。outbreak of disease / outbreak of violence / contain an outbreak は医療・社会系で超頻出。","tip":"💡 outbreak = sudden occurrence of disease or conflict（突然の発生・アウトブレイク）"},{"s":"The doctor explained that the ( ) for patients diagnosed at an early stage is generally far better than for those identified at a later stage.","a":1,"o":["diagnosis","prognosis","treatment","recovery"],"t":"医師は早期に診断された患者の予後は後期に診断された患者よりも一般的にはるかに良いと説明した。","e":"<span class='fb-correct'>✓ 正解：prognosis</span>prognosis は「予後・（病気の）見通し」。favorable prognosis / poor prognosis / long-term prognosis は医療系で頻出。pro（前）+ gnosis（知識）で「前もって知ること」という語源。","tip":"💡 prognosis = likely future course of a disease（予後・病気の見通し）"}];
var cS='英検準1級の語彙は十分なレベルです。1級レベルの語彙強化に進みましょう。',cA='英検準1級合格圏内のレベルです。間違えた単語を例文ごと復習して完成度を高めましょう。',cB='もう少しで合格レベルです。高度な語彙を文脈の中で確認しながら覚え直しましょう。',cC='語彙強化が必要です。パス単準1級などで頻出語を例文ごと覚えることを推奨します。';
var cur=0,score=0,wrong=[],done=false;
function go(){cur=0;score=0;wrong=[];done=false;document.getElementById('s0').className='screen';document.getElementById('s1').className='screen active';render();}
function render(){done=false;var q=Q[cur],t=Q.length;
  document.getElementById('pc').textContent=(cur+1)+' / '+t;
  document.getElementById('sv').textContent='\u6b63\u89e3: '+score;
  document.getElementById('pf').style.width=((cur/t)*100)+'%';
  document.getElementById('qt').textContent='QUESTION '+(cur+1);
  document.getElementById('qs').innerHTML=q.s.replace('( )','<span class="bk">(\u3000\u3000\u3000)</span>');
  document.getElementById('qt2').textContent=q.t;
  var g=document.getElementById('og');g.innerHTML='';
  ['A','B','C','D'].forEach(function(l,i){
    var b=document.createElement('button');b.className='ob';
    b.innerHTML='<span class="ol">'+l+'</span> '+q.o[i];
    b.onclick=(function(idx){return function(){pick(idx);};})(i);
    g.appendChild(b);});
  var fb=document.getElementById('fb');fb.className='fb';fb.innerHTML='';
  var nb=document.getElementById('bn');nb.className='bn';
  nb.textContent=cur+1===t?'\u7d50\u679c\u3092\u898b\u308b':'\u6b21\u306e\u554f\u984c \u2192';}
function pick(sel){if(done)return;done=true;var q=Q[cur];
  var bs=document.querySelectorAll('.ob');
  for(var i=0;i<bs.length;i++){bs[i].disabled=true;
    if(i===q.a)bs[i].classList.add('co');
    else if(i===sel&&sel!==q.a)bs[i].classList.add('wr');}
  var fb=document.getElementById('fb');
  if(sel===q.a){score++;document.getElementById('sv').textContent='\u6b63\u89e3: '+score;
    fb.innerHTML=q.e+'<span style="color:#94a3b8;font-size:12px;margin-top:6px;display:block;">'+q.tip+'</span>';}
  else{wrong.push({q:q,sel:sel});
    fb.innerHTML='<span style="color:#ef4444;font-weight:700;margin-bottom:6px;display:block;">\u2717 \u3042\u306a\u305f\u306e\u7b54\u3048\uff1a'+q.o[sel]+'</span>'+q.e+'<span style="color:#94a3b8;font-size:12px;margin-top:6px;display:block;">'+q.tip+'</span>';}
  fb.className='fb on';document.getElementById('bn').className='bn on';}
function nxt(){cur++;if(cur>=Q.length)showResult();else render();}
function showResult(){
  document.getElementById('s1').className='screen';
  document.getElementById('s2').className='screen active';
  var t=Q.length,p=Math.round((score/t)*100),rank,rc,rb,com;
  if(p>=90){rank='S';rc='#f0b429';rb='rgba(240,180,41,0.2)';com=cS;}
  else if(p>=77){rank='A';rc='#22c55e';rb='rgba(34,197,94,0.2)';com=cA;}
  else if(p>=60){rank='B';rc='#3b82f6';rb='rgba(59,130,246,0.2)';com=cB;}
  else{rank='C';rc='#ef4444';rb='rgba(239,68,68,0.2)';com=cC;}
  document.getElementById('rk').textContent=rank;
  document.getElementById('rk').style.color=rc;
  document.getElementById('rs').textContent=t+'\u554f\u4e2d '+score+'\u554f\u6b63\u89e3\uff08\u6b63\u7b54\u7387 '+p+'%\uff09';
  var rl=document.getElementById('rl');
  var rlTxt={S:'\u512a\u79c0',A:'\u5408\u683c\u5708\u5185',B:'\u3082\u3046\u5c11\u3057',C:'\u8981\u5f37\u5316'};
  rl.textContent=rlTxt[rank];
  rl.style.cssText='background:'+rb+';color:'+rc+';border:1px solid '+rc;
  document.getElementById('cm').textContent=com;
  var mf=document.getElementById('mf');mf.style.background=rc;
  setTimeout(function(){mf.style.width=p+'%';},100);
  var rv=document.getElementById('rv');
  if(!wrong.length){rv.innerHTML='<div style="text-align:center;color:#22c55e;font-weight:700;padding:20px 0;">\uD83C\uDF89 \u5168\u554f\u6b63\u89e3\uff01\u7d20\u6674\u3089\u3057\u3044\uff01</div>';return;}
  var h='<div class="rv-title">\u2717 \u9593\u9055\u3048\u305f\u554f\u984c\uff08'+wrong.length+'\u554f\uff09</div>';
  for(var i=0;i<wrong.length;i++){
    var wq=wrong[i].q,ws=wrong[i].sel;
    var sent=wq.s.replace('( )','<span style="color:#f0b429;font-weight:700;">'+wq.o[wq.a]+'</span>');
    h+='<div class="ri"><div class="ri-s">'+sent+'</div>';
    h+='<div><span class="ri-w">'+wq.o[ws]+'</span><span class="ri-c">\u2713 '+wq.o[wq.a]+'</span></div>';
    h+='<div class="ri-t">'+wq.tip+'</div></div>';}
  rv.innerHTML=h;}
function restart(){document.getElementById('s2').className='screen';document.getElementById('s0').className='screen active';}
